// Format note: YAML-ish for human scanning; the laws/queue are the contract, not the syntax.

meta:
  product: BuddyNext (free) + BuddyNext Pro
  thesis: "Mother of all — the nervous system that fuses the live Wbcom suite into one
           AI-powered, monetizable community. Pro is the integration hub: the answer to 'why Pro'."
  branches: "free + pro both on master/main — NO release branches"
  version_policy: "pre-release — NEVER bump version strings anywhere"

# ─────────────────────────────────────────────────────────────────────────────
# LAW 1 — Tier model (locked)
# ─────────────────────────────────────────────────────────────────────────────
tiers:
  free:
    is: "a complete community OS"
    has: [feed, spaces, profiles, social-graph, comments, reactions, moderation,
           notifications, member-directory, basic-search, "100% REST", "AI-ready ability surface"]
    core_integrations:   # mandatory floor — native surfaces live in FREE
      - WPMediaVerse      # media upload + DM/messages (native, DONE)
      - Jetonomy          # forums / Q&A (bridge in free; native forums surface PENDING)
      - WB-Gamification   # points / badges / engagement
    theme: BuddyX
    tier_aware: "core bridges light up the sibling's Pro features when its Pro is installed;
                 the bridge detects tier, never gates the sibling's own upsell"
  pro:
    is: "the application layer — community as a business"
    business_integrations: [Career-Board, Learnomy, WB-Listora, Eventonomy,
                            WPConnectPress, MediaShield, WP-Sell-Services, ProjectFlow]
    plus: [money-rails, "wbcom-credits-sdk (one wallet)", "AI/agent runtime", automation,
           analytics, push-FCM, realtime-Soketi, "power versions of free features"]
    boot: "plugins_loaded:20 — consumes Free's events/REST/abilities"
  business:
    is: "your own branded AI-powered network"
    has: [branded-native-app, full-white-label, custom-domain, SSO, advanced-roles,
          audit-log, member-CRM, multi-community, "WPConnectPress at scale"]

bridges:
  in_free:  [WPMediaVerseBridge, JetonomyBridge, GamificationBridge, BuddyXBridge]
  in_pro:   [CareerBoardBridge]                 # the one bridge that moves Free→Pro for launch
  build_in_pro_new: [LearnomyBridge, ListoraBridge, EventonomyBridge, WPConnectPressBridge]

governing_principle: "Raise the ceiling, don't lower the floor. Free is a COMPLETE
                      community; Pro is ahead (integrations + money + AI), never withholding basics."

# ─────────────────────────────────────────────────────────────────────────────
# LAW 2 — Integration law (locked, reaffirmed 2026-06-14)
# Every integration obeys ALL of these. No exceptions.
# ─────────────────────────────────────────────────────────────────────────────
integration_law:
  core_idea: "BuddyNext adds a COMMUNITY LAYER ON TOP of standalone plugins. It does NOT
              replace, rebuild, or take over a plugin's screens. Each plugin keeps its own
              pages and core features, untouched. BN drives engagement around them."

  golden_rules:   # apply to EVERY integration unless explicitly told otherwise
    - "NEVER take over a partner's screens/routes (no BN section that replaces their directory)."
    - "NEVER touch a plugin's core feature unless explicitly asked."
    - "NEVER make a partner CPT headless or suppress its archive to grab a URL."
    - "Integration touchpoints = PROFILE + ACTIVITY (+ possible SPACE). That's it."
    - "Link OUT to the partner's own pages — they own that UX."

  tier_2_application_layer:   # the DEFAULT for business apps: Career Board, Learnomy, Eventonomy, Listora, WPConnectPress, ...
    is: "Community layer on top. Light, engagement-focused."
    touchpoints:
      - "Profile: show the member's partner content (their posted jobs/resumes, their courses, ...) linking to the partner's page."
      - "Activity: when the member creates partner content (posts a job, publishes a course), publish a BN activity for engagement."
      - "Space (possible): surface partner content in a space context if a community wants it."
      - "Notifications: partner events (an application, an enrolment) → BN notifications."
    wiring: "A Bridge (includes/Bridges/ in Pro) listens to partner hooks and reacts in BN. No partner UI is touched."

  tier_1_core_primitive_takeover:   # RARE EXCEPTION — do not generalise
    is: "A deliberate native rebuild inside BN, ONLY for a core community primitive where a
         double-screen would confuse members (they'd see the same thing twice)."
    examples: "WPMediaVerse messaging → BN-native messages (so members never see two message screens). DONE."
    rule: "Reserved for core primitives. A business app NEVER qualifies. If unsure, it's Tier 2."

  third_party:
    - "External devs integrate via BN's extension seams (hooks/filters/REST); they own their own UI."

  how_doc: "plan/native-integration-program.md (Tier-1 native rebuild) · plan/integrations/<n>-<name>.md (per integration)"

# ─────────────────────────────────────────────────────────────────────────────
# LAW 3 — Engineering contracts (every task must satisfy)
# ─────────────────────────────────────────────────────────────────────────────
contracts:
  rest_frontend:  "100% REST, no admin-ajax — bin/check-rest-boundary.sh"
  scale:          "LIMIT on lists, cursor not OFFSET, no COUNT(*) in renders, cached counters"
  layering:       "controller (thin, no raw $wpdb) → service (owns DB) → BaseRestController auth"
  lockstep:       "Free + Pro reconciled together; Pro never reaches into Free tables with raw SQL"
  three_entry:    "every data store reachable via frontend + admin + REST"
  tdd:            "failing test → minimal impl → green → commit, per task"
  ui:             "no emoji in markup (use buddynext_icon); responsive verified at 390px;
                   browser-verify every UI item via Playwright MCP before marking done"
  no_file_splits: "large cohesive files are fine (3000 lines OK); split only to cut concepts/dups"

# ─────────────────────────────────────────────────────────────────────────────
