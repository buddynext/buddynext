name: CI

on:
  push:
    branches: [ master ]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpunit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.1', '8.2', '8.3' ]
        wp:  [ '6.9', 'latest' ]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: buddynext_tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
      - name: Install svn (required by bin/install-wp-tests.sh)
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends subversion
      - name: Composer install
        run: composer install --no-interaction --no-progress
      - name: Install WP test suite
        run: bash bin/install-wp-tests.sh buddynext_tests root root 127.0.0.1:3306 ${{ matrix.wp }}
      - name: PHPUnit
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
        run: vendor/bin/phpunit --colors=never

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
      - name: Composer install
        run: composer install --no-interaction --no-progress
      - name: PHPStan
        run: vendor/bin/phpstan analyse --level 5 --memory-limit 2G --no-progress

  coding-standards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
      - name: Composer install
        run: composer install --no-interaction --no-progress
      - name: PHPCS
        # PHPCS surfaces existing-debt warnings in this codebase;
        # we run it but don't fail the build yet — the goal here is visibility,
        # not blocking on pre-existing style debt. Switch to `continue-on-error: false`
        # once the WPCS-cleanup pass is done.
        continue-on-error: true
        run: vendor/bin/phpcs --standard=phpcs.xml.dist --report=summary
