name: CI

on:
  push:
    branches: [ master ]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: PHP Lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.0', '8.1', '8.2', '8.3', '8.4' ]
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Lint plugin PHP on PHP ${{ matrix.php }}
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            php -l "$f" >/dev/null 2>/tmp/lint.err || { echo "::error file=$f::$(cat /tmp/lint.err)"; fail=1; }
          done < <(find buddynext.php includes templates blocks -name '*.php' -print0)
          exit $fail

  static-analysis:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
      - name: Composer install
        run: composer install --no-interaction --no-progress
      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit 2G
