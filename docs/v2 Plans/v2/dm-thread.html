<!DOCTYPE html>
<html lang="en" data-bn-theme="light" data-bn-density="comfortable">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuddyNext — Messages · Sarah Rodriguez</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../chrome.css?v=3">
<style>
/* ─── DM page: full-bleed flush layout (no feed grid) ─── */
.bn-page[data-layout="dm"] {
  grid-template-columns: minmax(0, 1fr) !important;
  max-width: none !important;
  padding: 0 !important;
  height: calc(100vh - var(--bn-topbar-h) - var(--bn-topbar-h));
  min-height: 600px;
}

/* Three-pane shell that fills the available area */
.dm-shell {
  display: grid;
  grid-template-columns: 320px minmax(0, 1fr) 300px;
  height: 100%;
  background: var(--bn-bg);
  border-top: 1px solid var(--bn-line);
}
@media (max-width: 1280px) {
  .dm-shell { grid-template-columns: 300px minmax(0, 1fr); }
  .dm-details { display: none; }
}
@media (max-width: 900px) {
  .dm-shell { grid-template-columns: minmax(0, 1fr); }
  .dm-conversations { display: none; }
}

/* ─── Conversations panel ─── */
.dm-conversations {
  background: var(--bn-surface);
  border-right: 1px solid var(--bn-line);
  display: flex; flex-direction: column;
  min-height: 0;
}
.dm-conv-head {
  padding: var(--bn-s5) var(--bn-s5) var(--bn-s4);
  display: flex; flex-direction: column; gap: var(--bn-s3);
  border-bottom: 1px solid var(--bn-line);
}
.dm-conv-title-row {
  display: flex; align-items: center; justify-content: space-between;
}
.dm-conv-title {
  font-family: var(--bn-font-display);
  font-size: var(--bn-text-lg);
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--bn-ink);
}
.dm-conv-count {
  font-family: var(--bn-font-mono);
  font-size: 11px;
  color: var(--bn-ink-3);
  letter-spacing: 0.04em;
}
.dm-conv-search {
  display: flex; align-items: center; gap: var(--bn-s2);
  background: var(--bn-sunken);
  border: 1px solid transparent;
  border-radius: var(--bn-r-md);
  padding: 0 var(--bn-s3);
  height: 34px;
  transition: all var(--bn-dur) var(--bn-ease);
}
.dm-conv-search:focus-within {
  background: var(--bn-surface);
  border-color: var(--bn-accent);
}
.dm-conv-search svg { width: 14px; height: 14px; stroke: var(--bn-ink-3); }
.dm-conv-search input {
  flex: 1; border: none; background: transparent; outline: none;
  font: inherit; font-size: 13px; color: var(--bn-ink);
}
.dm-conv-search input::placeholder { color: var(--bn-ink-4); }
.dm-conv-search-kbd {
  font-family: var(--bn-font-mono);
  font-size: 10px;
  color: var(--bn-ink-4);
  background: var(--bn-surface);
  padding: 1px 5px;
  border-radius: 3px;
  border: 1px solid var(--bn-line);
}

/* Tabs */
.dm-conv-tabs {
  display: flex; gap: var(--bn-s1);
  padding: 0 var(--bn-s5);
  border-bottom: 1px solid var(--bn-line);
}
.dm-conv-tab {
  padding: var(--bn-s3) var(--bn-s2);
  font-size: 12px;
  font-weight: 500;
  color: var(--bn-ink-3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  display: flex; align-items: center; gap: var(--bn-s1);
  transition: color var(--bn-dur) var(--bn-ease);
}
.dm-conv-tab:hover { color: var(--bn-ink); }
.dm-conv-tab.active {
  color: var(--bn-accent);
  border-bottom-color: var(--bn-accent);
  font-weight: 600;
}
.dm-conv-tab-pill {
  background: var(--bn-danger, #dc2626);
  color: white;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 8px;
  font-family: var(--bn-font-mono);
}

/* Conversation list */
.dm-conv-list {
  flex: 1; overflow-y: auto;
  padding: var(--bn-s2) 0;
}
.dm-conv-section-label {
  padding: var(--bn-s3) var(--bn-s5) var(--bn-s2);
  font-family: var(--bn-font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--bn-ink-4);
}
.dm-conv-item {
  display: flex; gap: var(--bn-s3);
  padding: var(--bn-s3) var(--bn-s5);
  cursor: pointer;
  position: relative;
  transition: background var(--bn-dur-fast) var(--bn-ease);
  border-left: 2px solid transparent;
}
.dm-conv-item:hover { background: var(--bn-sunken); }
.dm-conv-item.active {
  background: var(--bn-accent-100);
  border-left-color: var(--bn-accent);
}
.dm-conv-item.active .dm-conv-name { color: var(--bn-accent); }
.dm-conv-item.unread::before {
  content: '';
  position: absolute;
  left: var(--bn-s5); top: 50%;
  width: 6px; height: 6px;
  background: var(--bn-accent);
  border-radius: 50%;
  margin-left: -10px;
  margin-top: -3px;
}

.dm-avatar {
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-family: var(--bn-font-mono);
  font-weight: 600;
  flex-shrink: 0;
  position: relative;
}
.dm-avatar.size-sm { width: 28px; height: 28px; font-size: 10px; }
.dm-avatar.size-md { width: 40px; height: 40px; font-size: 13px; }
.dm-avatar.size-lg { width: 52px; height: 52px; font-size: 15px; }
.dm-avatar.av-blue { background: linear-gradient(135deg, oklch(65% 0.18 240), oklch(55% 0.18 230)); }
.dm-avatar.av-green { background: linear-gradient(135deg, oklch(65% 0.16 155), oklch(55% 0.16 165)); }
.dm-avatar.av-purple { background: linear-gradient(135deg, oklch(60% 0.20 290), oklch(50% 0.22 295)); }
.dm-avatar.av-orange { background: linear-gradient(135deg, oklch(70% 0.16 60), oklch(60% 0.18 50)); }
.dm-avatar.av-pink { background: linear-gradient(135deg, oklch(68% 0.18 350), oklch(58% 0.20 345)); }
.dm-avatar.av-teal { background: linear-gradient(135deg, oklch(65% 0.14 195), oklch(55% 0.16 200)); }
.dm-online {
  position: absolute;
  bottom: 0; right: 0;
  width: 11px; height: 11px;
  background: oklch(65% 0.18 145);
  border: 2px solid var(--bn-surface);
  border-radius: 50%;
}
.dm-conv-item.active .dm-online { border-color: var(--bn-accent-100); }

.dm-conv-info {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; justify-content: center;
}
.dm-conv-name-row {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: var(--bn-s2);
}
.dm-conv-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--bn-ink);
  letter-spacing: -0.005em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.dm-conv-time {
  font-family: var(--bn-font-mono);
  font-size: 10px;
  color: var(--bn-ink-4);
  flex-shrink: 0;
  letter-spacing: 0.02em;
}
.dm-conv-item.unread .dm-conv-time { color: var(--bn-accent); font-weight: 600; }
.dm-conv-preview-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: var(--bn-s2);
  margin-top: 2px;
}
.dm-conv-preview {
  font-size: 12px;
  color: var(--bn-ink-3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.dm-conv-preview.typing { color: var(--bn-accent); font-style: italic; }
.dm-conv-item.unread .dm-conv-preview { color: var(--bn-ink-2); font-weight: 500; }
.dm-conv-badge {
  background: var(--bn-accent);
  color: white;
  font-family: var(--bn-font-mono);
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 8px;
  flex-shrink: 0;
}
.dm-conv-meta {
  flex-shrink: 0;
  font-size: 11px;
  color: var(--bn-ink-4);
}

/* Foot — new message */
.dm-conv-foot {
  padding: var(--bn-s3) var(--bn-s4);
  border-top: 1px solid var(--bn-line);
  background: var(--bn-surface);
}
.dm-new-btn {
  width: 100%;
  display: flex; align-items: center; justify-content: center; gap: var(--bn-s2);
  padding: var(--bn-s3);
  background: var(--bn-ink);
  color: var(--bn-bg);
  border: none;
  border-radius: var(--bn-r-md);
  font: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer;
  transition: opacity var(--bn-dur) var(--bn-ease);
}
.dm-new-btn:hover { opacity: 0.9; }
.dm-new-btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2.5; fill: none; }

/* ─── Thread panel ─── */
.dm-thread {
  display: flex; flex-direction: column;
  background: var(--bn-bg);
  min-height: 0;
}
.dm-thread-head {
  height: 64px;
  padding: 0 var(--bn-s5);
  border-bottom: 1px solid var(--bn-line);
  background: var(--bn-surface);
  display: flex; align-items: center; gap: var(--bn-s3);
  flex-shrink: 0;
}
.dm-thread-head-info {
  flex: 1; min-width: 0;
}
.dm-thread-head-name {
  display: flex; align-items: center; gap: var(--bn-s2);
  font-size: 14px;
  font-weight: 600;
  color: var(--bn-ink);
}
.dm-thread-head-handle {
  font-family: var(--bn-font-mono);
  font-size: 11px;
  color: var(--bn-ink-4);
  font-weight: 400;
}
.dm-thread-head-status {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px;
  color: var(--bn-ink-3);
  margin-top: 2px;
}
.dm-status-dot {
  width: 7px; height: 7px;
  background: oklch(65% 0.18 145);
  border-radius: 50%;
  box-shadow: 0 0 0 3px color-mix(in oklch, oklch(65% 0.18 145) 18%, transparent);
}
.dm-thread-actions {
  display: flex; gap: var(--bn-s1);
}
.dm-icon-btn {
  width: 32px; height: 32px;
  border-radius: var(--bn-r-md);
  border: none;
  background: transparent;
  color: var(--bn-ink-3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--bn-dur-fast) var(--bn-ease);
}
.dm-icon-btn:hover { background: var(--bn-sunken); color: var(--bn-ink); }
.dm-icon-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.75; fill: none; }

/* Messages area */
.dm-messages {
  flex: 1;
  overflow-y: auto;
  padding: var(--bn-s5);
  display: flex; flex-direction: column;
  gap: var(--bn-s1);
  min-height: 0;
}
.dm-day-divider {
  display: flex; align-items: center; gap: var(--bn-s3);
  margin: var(--bn-s4) 0 var(--bn-s2);
}
.dm-day-divider::before, .dm-day-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--bn-line);
}
.dm-day-divider span {
  font-family: var(--bn-font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--bn-ink-4);
}

/* Date inline pill (for first msg of session, e.g.) */

.dm-msg {
  display: flex;
  gap: var(--bn-s3);
  align-items: flex-end;
  max-width: 75%;
  margin-bottom: 2px;
}
.dm-msg.mine {
  align-self: flex-end;
  flex-direction: row-reverse;
}
.dm-msg-avatar-wrap {
  width: 28px; flex-shrink: 0;
  display: flex; align-items: flex-end;
}
.dm-msg.tail-prev .dm-msg-avatar-wrap { visibility: hidden; }
.dm-msg-content {
  display: flex; flex-direction: column;
  gap: 3px; min-width: 0;
}
.dm-msg.mine .dm-msg-content { align-items: flex-end; }

.dm-bubble {
  padding: 9px 13px;
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--bn-ink);
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: 16px 16px 16px 4px;
  word-break: break-word;
  max-width: 100%;
  position: relative;
}
.dm-msg.mine .dm-bubble {
  background: var(--bn-accent);
  color: white;
  border-color: var(--bn-accent);
  border-radius: 16px 16px 4px 16px;
}
/* When previous message from same sender, square the tail-side */
.dm-msg.tail-prev:not(.mine) .dm-bubble { border-top-left-radius: 4px; }
.dm-msg.tail-prev.mine .dm-bubble { border-top-right-radius: 4px; }

/* Quoted reply inside bubble */
.dm-quoted {
  background: var(--bn-sunken);
  border-left: 2px solid var(--bn-accent);
  border-radius: 4px;
  padding: 6px 10px;
  margin-bottom: 6px;
  font-size: 12px;
  color: var(--bn-ink-3);
}
.dm-quoted-author {
  font-weight: 600;
  color: var(--bn-ink-2);
  font-size: 11px;
  margin-bottom: 1px;
}
.dm-msg.mine .dm-quoted {
  background: color-mix(in oklch, white 18%, var(--bn-accent));
  border-left-color: white;
  color: rgba(255,255,255,0.85);
}
.dm-msg.mine .dm-quoted-author { color: white; }

/* Image bubble */
.dm-bubble.image {
  padding: 4px;
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
}
.dm-bubble-image {
  width: 280px;
  height: 180px;
  border-radius: 12px;
  background:
    linear-gradient(135deg,
      color-mix(in oklch, var(--bn-accent) 30%, transparent),
      color-mix(in oklch, var(--bn-jetonomy, #5b21b6) 30%, transparent)),
    var(--bn-sunken);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--bn-font-mono);
  font-size: 11px;
  color: white;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
}
.dm-bubble-image::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(45deg,
    transparent 0 12px,
    rgba(255,255,255,0.06) 12px 13px);
}

/* File bubble */
.dm-file-bubble {
  display: flex; align-items: center; gap: var(--bn-s3);
  padding: 10px 14px 10px 10px;
  min-width: 240px;
}
.dm-file-icon {
  width: 38px; height: 38px;
  background: var(--bn-sunken);
  border-radius: var(--bn-r-sm);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--bn-font-mono);
  font-size: 9px;
  font-weight: 700;
  color: var(--bn-accent);
  letter-spacing: 0.02em;
  flex-shrink: 0;
}
.dm-msg.mine .dm-file-icon { background: rgba(255,255,255,0.18); color: white; }
.dm-file-info { flex: 1; min-width: 0; }
.dm-file-name { font-size: 13px; font-weight: 600; }
.dm-file-meta {
  font-family: var(--bn-font-mono);
  font-size: 10px;
  opacity: 0.7;
  margin-top: 1px;
}

/* Meta row under bubble */
.dm-msg-meta {
  display: flex; align-items: center; gap: var(--bn-s2);
  font-family: var(--bn-font-mono);
  font-size: 10px;
  color: var(--bn-ink-4);
  letter-spacing: 0.02em;
  padding: 0 4px;
}
.dm-msg.mine .dm-msg-meta { flex-direction: row-reverse; }
.dm-read {
  color: var(--bn-accent);
  font-size: 11px;
  display: inline-flex; align-items: center;
  letter-spacing: -2px;
}

/* Reactions */
.dm-reactions {
  display: flex; gap: 3px;
  flex-wrap: wrap;
  margin-top: 2px;
}
.dm-msg.mine .dm-reactions { justify-content: flex-end; }
.dm-react {
  display: inline-flex; align-items: center; gap: 3px;
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: 12px;
  padding: 2px 7px;
  font-size: 11px;
  font-weight: 500;
  color: var(--bn-ink-2);
  cursor: pointer;
  transition: all var(--bn-dur-fast) var(--bn-ease);
}
.dm-react:hover { border-color: var(--bn-accent); color: var(--bn-accent); }
.dm-react.mine { background: var(--bn-accent-100); border-color: var(--bn-accent); color: var(--bn-accent); }
.dm-react-count { font-family: var(--bn-font-mono); font-size: 10px; }

/* System message */
.dm-system {
  align-self: center;
  display: flex; align-items: center; gap: var(--bn-s2);
  background: var(--bn-sunken);
  border-radius: 12px;
  padding: 6px 12px;
  font-size: 11px;
  color: var(--bn-ink-3);
  font-family: var(--bn-font-mono);
  margin: var(--bn-s2) 0;
}
.dm-system svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 2; fill: none; }

/* Typing indicator */
.dm-typing {
  display: flex; gap: var(--bn-s3); align-items: flex-end;
  padding: var(--bn-s2) 0;
}
.dm-typing-bubble {
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: 16px 16px 16px 4px;
  padding: 11px 14px;
}
.dm-typing-dots { display: flex; gap: 4px; }
.dm-typing-dot {
  width: 6px; height: 6px;
  background: var(--bn-ink-4);
  border-radius: 50%;
  animation: dm-bounce 1.3s infinite ease-in-out;
}
.dm-typing-dot:nth-child(2) { animation-delay: 0.15s; }
.dm-typing-dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes dm-bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
  30% { transform: translateY(-5px); opacity: 1; }
}
.dm-typing-label {
  font-size: 11px;
  color: var(--bn-ink-4);
  font-style: italic;
  align-self: center;
  margin-left: 4px;
}

/* Composer */
.dm-composer {
  border-top: 1px solid var(--bn-line);
  background: var(--bn-surface);
  padding: var(--bn-s3) var(--bn-s5);
  flex-shrink: 0;
}
.dm-composer-context {
  display: flex; align-items: center; gap: var(--bn-s2);
  margin-bottom: var(--bn-s2);
  padding: 6px 10px;
  background: var(--bn-sunken);
  border-left: 2px solid var(--bn-accent);
  border-radius: 4px;
  font-size: 11px;
  color: var(--bn-ink-3);
}
.dm-composer-context-label { color: var(--bn-accent); font-weight: 600; }
.dm-composer-context-close {
  margin-left: auto;
  cursor: pointer;
  color: var(--bn-ink-4);
  font-size: 14px;
  line-height: 1;
}

.dm-composer-row {
  display: flex; align-items: flex-end;
  gap: var(--bn-s2);
  background: var(--bn-bg);
  border: 1px solid var(--bn-line);
  border-radius: 22px;
  padding: 6px 6px 6px 14px;
  transition: border-color var(--bn-dur) var(--bn-ease);
}
.dm-composer-row:focus-within { border-color: var(--bn-accent); }
.dm-composer-input {
  flex: 1;
  border: none; background: transparent; outline: none;
  resize: none;
  font: inherit; font-size: 13.5px;
  line-height: 1.5;
  color: var(--bn-ink);
  min-height: 22px;
  max-height: 120px;
  padding: 5px 0;
}
.dm-composer-input::placeholder { color: var(--bn-ink-4); }
.dm-composer-tools {
  display: flex; align-items: center; gap: 2px;
  padding-bottom: 2px;
}
.dm-composer-icon {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: none; background: transparent;
  color: var(--bn-ink-3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--bn-dur-fast) var(--bn-ease);
}
.dm-composer-icon:hover { background: var(--bn-sunken); color: var(--bn-ink); }
.dm-composer-icon svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.75; fill: none; }
.dm-send {
  width: 32px; height: 32px;
  background: var(--bn-accent);
  border: none;
  border-radius: 50%;
  color: white;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--bn-dur-fast) var(--bn-ease);
}
.dm-send:hover { background: var(--bn-accent-600); transform: scale(1.05); }
.dm-send svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2.5; fill: none; }

.dm-composer-foot {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: var(--bn-s2);
  font-family: var(--bn-font-mono);
  font-size: 10px;
  color: var(--bn-ink-4);
}
.dm-composer-foot kbd {
  font-family: var(--bn-font-mono);
  background: var(--bn-sunken);
  border: 1px solid var(--bn-line);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 10px;
