<style>
.dir-stack { display: flex; flex-direction: column; gap: var(--bn-s4); }

/* Filter bar */
.member-filters {
  display: flex; gap: var(--bn-s2); align-items: center; flex-wrap: wrap;
  padding-bottom: var(--bn-s3);
  border-bottom: 1px solid var(--bn-line-faint);
}
.member-search { flex: 1; min-width: 240px; position: relative; }
.member-search input {
  width: 100%; padding: 9px 14px 9px 36px;
  border: 1px solid var(--bn-line); border-radius: var(--bn-r-md);
  background: var(--bn-surface); font-family: var(--bn-font-ui);
  font-size: var(--bn-text-sm); color: var(--bn-ink);
}
.member-search input:focus { outline: none; border-color: var(--bn-accent); box-shadow: 0 0 0 3px var(--bn-accent-100); }
.member-search svg {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%); width: 16px; height: 16px;
  color: var(--bn-ink-3);
}
.fs-select {
  padding: 8px 12px; border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-md); background: var(--bn-surface);
  font-family: var(--bn-font-ui); font-size: var(--bn-text-sm); color: var(--bn-ink); cursor: pointer;
}
.view-toggle { display: flex; border: 1px solid var(--bn-line); border-radius: var(--bn-r-md); overflow: hidden; }
.view-btn {
  padding: 7px 11px; cursor: pointer; font-size: 14px;
  color: var(--bn-ink-3); background: var(--bn-surface);
}
.view-btn[aria-current="true"] { background: var(--bn-ink); color: var(--bn-surface); }
.result-count {
  font-family: var(--bn-font-mono); font-size: var(--bn-text-xs);
  color: var(--bn-ink-3); white-space: nowrap;
}

/* Letter index */
.letter-index {
  display: flex; gap: 2px; flex-wrap: wrap;
  padding: var(--bn-s2) 0;
}
.letter-btn {
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--bn-font-mono); font-size: 11px;
  color: var(--bn-ink-3); border-radius: var(--bn-r-sm);
  cursor: pointer;
}
.letter-btn:hover { background: var(--bn-sunken); color: var(--bn-ink); }
.letter-btn[aria-current="true"] { background: var(--bn-ink); color: var(--bn-surface); }
.letter-btn[aria-disabled="true"] { color: var(--bn-line); cursor: default; }

/* Section heads */
.dir-section-head {
  display: flex; align-items: baseline; gap: var(--bn-s3);
  margin: var(--bn-s2) 0;
}
.dir-section-title {
  font-family: var(--bn-font-display);
  font-size: var(--bn-text-xs); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--bn-ink-2);
}
.dir-section-count { font-family: var(--bn-font-mono); font-size: var(--bn-text-xs); color: var(--bn-ink-3); }

/* Members grid */
.members-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--bn-s3); }
@media (max-width: 1100px) { .members-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 760px) { .members-grid { grid-template-columns: repeat(2, 1fr); } }

.m-card {
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-lg);
  padding: var(--bn-s4);
  text-align: center;
  display: flex; flex-direction: column; align-items: center;
  gap: 6px;
  transition: all var(--bn-dur-fast) var(--bn-ease);
}
.m-card:hover { border-color: var(--bn-ink-3); transform: translateY(-1px); }

.m-av-wrap { position: relative; margin-bottom: var(--bn-s2); }
.m-av {
  width: 64px; height: 64px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; font-size: 22px;
  font-family: var(--bn-font-display);
}
.m-av[data-tone="green"] { background: linear-gradient(135deg, #34d399, #059669); }
.m-av[data-tone="violet"] { background: linear-gradient(135deg, #a78bfa, #7c3aed); }
.m-av[data-tone="orange"] { background: linear-gradient(135deg, #fb923c, #ea580c); }
.m-av[data-tone="teal"] { background: linear-gradient(135deg, #2dd4bf, #0d9488); }
.m-av[data-tone="pink"] { background: linear-gradient(135deg, #f472b6, #db2777); }
.m-av[data-tone="red"] { background: linear-gradient(135deg, #f87171, #dc2626); }
.m-av[data-tone="amber"] { background: linear-gradient(135deg, #fbbf24, #d97706); }
.m-av[data-tone="sky"] { background: linear-gradient(135deg, #60a5fa, #2563eb); }

.online-dot {
  position: absolute; bottom: 0; right: 0;
  width: 14px; height: 14px;
  background: #10b981; border-radius: 50%;
  border: 2.5px solid var(--bn-surface);
}

.m-name {
  font-family: var(--bn-font-display);
  font-weight: 700; font-size: var(--bn-text-base);
  color: var(--bn-ink); letter-spacing: -0.01em;
}
.m-handle {
  font-family: var(--bn-font-mono);
  font-size: var(--bn-text-xs); color: var(--bn-ink-3);
}
.m-title {
  font-size: var(--bn-text-sm); color: var(--bn-ink-2);
  margin-top: 2px;
}
.m-degree {
  display: inline-block; padding: 1px 8px;
  border-radius: var(--bn-r-full);
  font-family: var(--bn-font-mono); font-size: 10px;
  font-weight: 600;
  margin-top: 2px;
}
.m-degree[data-deg="1"] { background: var(--bn-accent-100); color: var(--bn-accent-700); }
.m-degree[data-deg="2"] { background: #ede9fe; color: #5b21b6; }
.m-degree[data-deg="3"] { background: var(--bn-sunken); color: var(--bn-ink-3); }

.m-skills {
  display: flex; flex-wrap: wrap; gap: 4px; justify-content: center;
  margin-top: var(--bn-s1);
}
.m-skill {
  font-family: var(--bn-font-mono); font-size: 10px;
  background: var(--bn-sunken); color: var(--bn-ink-2);
  padding: 2px 7px; border-radius: var(--bn-r-sm);
}

.m-mutual {
  font-size: var(--bn-text-xs); color: var(--bn-ink-3);
  display: inline-flex; align-items: center; gap: 4px;
  margin-top: var(--bn-s1);
}
.m-mutual-avs { display: inline-flex; }
.m-mutual-avs > div {
  width: 14px; height: 14px; border-radius: 50%;
  border: 1.5px solid var(--bn-surface);
  margin-left: -4px;
}
.m-mutual-avs > div:first-child { margin-left: 0; }

.m-actions {
  margin-top: auto; padding-top: var(--bn-s3);
  display: flex; gap: 6px; width: 100%;
}
.m-actions .bn-btn { flex: 1; }

/* Empty / more card */
.m-card-more {
  border-style: dashed;
  background: var(--bn-canvas);
  justify-content: center;
  text-align: center; gap: var(--bn-s2);
}
.m-card-more-glyph {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--bn-sunken);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.m-card-more h4 { font-family: var(--bn-font-display); font-size: var(--bn-text-base); color: var(--bn-ink); margin: 0; font-weight: 600; }
.m-card-more p { font-size: var(--bn-text-sm); color: var(--bn-ink-3); margin: 0; }

/* Pagination */

  display: flex; gap: 4px; justify-content: center;
  padding: var(--bn-s4) 0;
}
.page-btn {
  min-width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--bn-line); border-radius: var(--bn-r-sm);
  background: var(--bn-surface); cursor: pointer;

  color: var(--bn-ink-2);
}
.page-btn:hover { border-color: var(--bn-ink-3); color: var(--bn-ink); }
.page-btn[aria-current="true"] {
  background: var(--bn-ink); color: var(--bn-surface); border-color: var(--bn-ink);

</style>
</head>

              <div style="font-size:var(--bn-text-xs); color: var(--bn-ink-3);">${a}</div>
            </div>
          </div>
        `).join('')}
      </div>

        <div style="display:flex; justify-content:space-between; padding: 4px 0;"><span style="color:var(--bn-ink);">Pro members</span><span style="font-family:var(--bn-font-mono); color:var(--bn-accent);">25</span></div>

`;

document.getElementById('app').innerHTML = renderChrome({

document.querySelectorAll('.letter-btn').forEach(b => {
  if (b.getAttribute('aria-disabled') === 'true') return;
  b.addEventListener('click', () => {
    document.querySelectorAll('.letter-btn').forEach(s => s.removeAttribute('aria-current'));
    b.setAttribute('aria-current', 'true');
  });
});
document.querySelectorAll('.view-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(s => s.removeAttribute('aria-current'));
    b.setAttribute('aria-current', 'true');
  });
});
