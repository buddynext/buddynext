<style>
/* ─── Page-specific: post detail / thread ─── */
.pd-stack { display: flex; flex-direction: column; gap: var(--bn-s4); }

.pd-back {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: var(--bn-text-sm);
  color: var(--bn-ink-3);
  font-weight: 500;
  padding: 4px 8px; margin: -4px -8px;
  border-radius: var(--bn-r-sm);
  width: fit-content;
}
.pd-back:hover { color: var(--bn-ink); background: var(--bn-sunken); }
.pd-back svg { width: 16px; height: 16px; stroke-width: 2; }

/* Hero post */
.pd-hero {
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-lg);
  padding: var(--bn-s5);
  display: flex; flex-direction: column;
  gap: var(--bn-s4);
}
.pd-hero-head {
  display: flex; align-items: center; gap: var(--bn-s3);
}
.pd-hero-author {
  font-family: var(--bn-font-display);
  font-size: var(--bn-text-base);
  font-weight: 600;
  color: var(--bn-ink);
  display: flex; align-items: center; gap: 8px;
  letter-spacing: -0.01em;
}
.pd-hero-meta {
  font-size: var(--bn-text-xs);
  color: var(--bn-ink-3);
  display: flex; align-items: center; gap: 6px;
  margin-top: 2px;
}
.pd-hero-meta a { color: var(--bn-ink-2); font-weight: 500; }
.pd-hero-meta .sep { color: var(--bn-ink-4); }
.pd-hero-title {
  font-family: var(--bn-font-display);
  font-size: var(--bn-text-2xl);
  font-weight: 700;
  letter-spacing: -0.025em;
  line-height: 1.18;
  color: var(--bn-ink);
}
.pd-hero-body {
  font-size: var(--bn-text-base);
  line-height: 1.65;
  color: var(--bn-ink);
}
.pd-hero-body p + p { margin-top: 1em; }
.pd-hero-body a { color: var(--bn-accent); }
.pd-hero-body code {
  background: var(--bn-sunken);
  padding: 2px 6px;
  border-radius: var(--bn-r-sm);
  font-family: var(--bn-font-mono);
  font-size: 0.92em;
  color: var(--bn-ink);
}
.pd-hero-body pre {
  background: var(--bn-sunken);
  border: 1px solid var(--bn-line-faint);
  border-radius: var(--bn-r-md);
  padding: var(--bn-s3) var(--bn-s4);
  overflow-x: auto;
  font-family: var(--bn-font-mono);
  font-size: var(--bn-text-xs);
  line-height: 1.55;
  color: var(--bn-ink);
}
.pd-hero-body blockquote {
  border-left: 3px solid var(--bn-accent-300);
  padding: 4px 0 4px var(--bn-s4);
  color: var(--bn-ink-2);
  font-style: italic;
}

/* Reactions on hero */
.pd-react-row {
  display: flex; align-items: center; gap: var(--bn-s3);
  padding: var(--bn-s3) 0;
  border-top: 1px solid var(--bn-line-faint);
  border-bottom: 1px solid var(--bn-line-faint);
}
.pd-react-row .reactions { flex: 1; }
.reactions { display: flex; gap: 4px; flex-wrap: wrap; }
.reaction {
  display: inline-flex; align-items: center; gap: 4px;
  height: 28px; padding: 0 10px;
  border-radius: var(--bn-r-full);
  background: var(--bn-sunken);
  font-size: var(--bn-text-xs);
  font-weight: 600;
  color: var(--bn-ink-2);
  border: 1px solid transparent;
}
.reaction:hover { border-color: var(--bn-accent); }
.reaction[data-mine="true"] { background: var(--bn-accent-100); color: var(--bn-accent-700); border-color: var(--bn-accent-300); }
.reaction-add {
  width: 28px; height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--bn-r-full);
  background: var(--bn-sunken);
  color: var(--bn-ink-3);
}
.reaction-add svg { width: 14px; height: 14px; stroke-width: 2; }

/* Engagement strip */
.pd-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--bn-s4);
  padding: var(--bn-s2) 0;
}
.pd-stat-num {
  font-family: var(--bn-font-display);
  font-size: var(--bn-text-xl);
  font-weight: 700;
  color: var(--bn-ink);
  letter-spacing: -0.02em;
}
.pd-stat-label {
  font-size: 11px;
  color: var(--bn-ink-3);
  font-family: var(--bn-font-mono);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 2px;
}

/* Hero actions row */
.pd-hero-actions {
  display: flex; gap: var(--bn-s3);
}
.pd-hero-actions .bn-btn { flex: 1; }

/* Sort bar */
.pd-sort-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--bn-s2) 4px;
  border-bottom: 1px solid var(--bn-line);
}
.pd-sort-title {
  font-family: var(--bn-font-display);
  font-size: var(--bn-text-base);
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--bn-ink);
  display: flex; align-items: center; gap: var(--bn-s2);
}
.pd-sort-title .num {
  font-family: var(--bn-font-mono);
  font-size: var(--bn-text-xs);
  color: var(--bn-ink-3);
  background: var(--bn-sunken);
  padding: 2px 8px;
  border-radius: var(--bn-r-full);
  font-weight: 500;
}
.pd-sort {
  display: inline-flex; gap: 0;
  background: var(--bn-sunken);
  border-radius: var(--bn-r-md);
  padding: 2px;
}
.pd-sort-opt {
  padding: 5px 10px;
  font-size: var(--bn-text-xs);
  font-weight: 500;
  border-radius: calc(var(--bn-r-md) - 2px);
  color: var(--bn-ink-3);
  cursor: pointer;
}
.pd-sort-opt[aria-current="true"] {
  background: var(--bn-surface);
  color: var(--bn-ink);
  box-shadow: var(--bn-shadow-sm);
}

/* Reply composer */
.pd-reply {
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-lg);
  padding: var(--bn-s4);
  display: flex; gap: var(--bn-s3);
}
.pd-reply-input {
  flex: 1;
  display: flex; flex-direction: column; gap: var(--bn-s3);
}
.pd-reply-input textarea {
  width: 100%;
  border: none;
  background: transparent;
  resize: none;
  font-family: var(--bn-font-ui);
  font-size: var(--bn-text-sm);
  color: var(--bn-ink);
  line-height: 1.5;
  min-height: 36px;
}
.pd-reply-input textarea:focus { outline: none; }
.pd-reply-tools {
  display: flex; align-items: center; gap: var(--bn-s2);
  padding-top: var(--bn-s2);
  border-top: 1px solid var(--bn-line-faint);
}
.pd-reply-tool {
  width: 28px; height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--bn-ink-3);
  border-radius: var(--bn-r-sm);
}
.pd-reply-tool:hover { background: var(--bn-sunken); color: var(--bn-ink); }
.pd-reply-tool svg { width: 16px; height: 16px; stroke-width: 1.75; }

/* Reply thread */
.pd-replies { display: flex; flex-direction: column; gap: var(--bn-s4); padding-top: var(--bn-s2); }

.reply {
  display: flex; gap: var(--bn-s3);
  position: relative;
}
.reply-tree {
  width: 32px; flex-shrink: 0;
  position: relative;
  display: flex; flex-direction: column; align-items: center;
}
.reply-tree-line {
  width: 2px;
  background: var(--bn-line);
  flex: 1;
  margin-top: 4px;
}
.reply-body {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; gap: var(--bn-s2);
}
.reply-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.reply-author {
  font-size: var(--bn-text-sm);
  font-weight: 600;
  color: var(--bn-ink);
}
.reply-author.op {
  color: var(--bn-accent-700);
}
.reply-time {
  font-size: var(--bn-text-xs);
  color: var(--bn-ink-3);
  font-family: var(--bn-font-mono);
}
.reply-pin {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px;
  font-weight: 600;
  color: var(--bn-success);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.reply-text {
  font-size: var(--bn-text-sm);
  color: var(--bn-ink);
  line-height: 1.55;
}
.reply-text a { color: var(--bn-accent); }
.reply-text code {
  background: var(--bn-sunken);
  padding: 1px 5px;
  border-radius: var(--bn-r-sm);
  font-family: var(--bn-font-mono);
  font-size: 0.9em;
}
.reply-text blockquote {
  border-left: 2px solid var(--bn-line-strong);
  padding-left: var(--bn-s3);
  color: var(--bn-ink-3);
  margin: var(--bn-s2) 0;
}
.reply-actions {
  display: flex; gap: var(--bn-s4); align-items: center;
}
.reply-action {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: var(--bn-text-xs);
  color: var(--bn-ink-3);
  font-weight: 500;
  padding: 4px 6px;
  margin: -4px -6px;
  border-radius: var(--bn-r-sm);
  cursor: pointer;
}
.reply-action:hover { color: var(--bn-accent); background: var(--bn-sunken); }
.reply-action svg { width: 13px; height: 13px; stroke-width: 1.75; }
.reply-action.liked { color: var(--bn-danger); }

.reply-children {
  margin-top: var(--bn-s3);
  display: flex; flex-direction: column; gap: var(--bn-s3);
}

/* Best answer card */
.pd-answer {
  background: linear-gradient(135deg,
    color-mix(in oklch, var(--bn-success) 10%, var(--bn-surface)),
    var(--bn-surface));
  border: 1px solid color-mix(in oklch, var(--bn-success) 40%, var(--bn-line));
  border-radius: var(--bn-r-lg);
  padding: var(--bn-s4) var(--bn-s5);
  position: relative;
}
.pd-answer-tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--bn-font-mono);
  font-size: 10px;
  font-weight: 700;
  color: var(--bn-success);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: var(--bn-s3);
}
.pd-answer-tag::before {
  content: '✓'; width: 16px; height: 16px;
  background: var(--bn-success);
  color: #fff;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 10px;
}

/* Aside: post info */
.aside-card {
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-lg);
  padding: var(--bn-s4);
}
.aside-title {
  font-family: var(--bn-font-display);
  font-size: var(--bn-text-sm);
  font-weight: 600;
  color: var(--bn-ink);
  margin-bottom: var(--bn-s3);
  letter-spacing: -0.01em;
}
.aside-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 8px 0;
  border-bottom: 1px solid var(--bn-line-faint);
  font-size: var(--bn-text-sm);
}
.aside-row:last-child { border-bottom: none; }
.aside-row span:first-child {
  color: var(--bn-ink-3);
  font-size: var(--bn-text-xs);
}
.aside-row span:last-child {
  font-family: var(--bn-font-mono);
  font-size: var(--bn-text-xs);
  color: var(--bn-ink);
}

.contrib-row {
  display: flex; align-items: center; gap: var(--bn-s2);
  padding: 6px 0;
  border-bottom: 1px solid var(--bn-line-faint);
}
.contrib-row:last-child { border-bottom: none; }
.contrib-info { flex: 1; min-width: 0; }
.contrib-name { font-size: var(--bn-text-sm); font-weight: 600; line-height: 1.3; color: var(--bn-ink); }
.contrib-count {
  font-family: var(--bn-font-mono);
  font-size: 11px;
  color: var(--bn-ink-3);
}
.contrib-bar {
  height: 3px; border-radius: 2px;
  background: var(--bn-sunken);
  margin-top: 4px;
  overflow: hidden;
}
.contrib-bar i {
  display: block;
  height: 100%;
  background: var(--bn-accent);
  border-radius: 2px;
}

.related-row {
  display: flex; flex-direction: column; gap: 2px;
  padding: var(--bn-s2) 0;
  border-bottom: 1px solid var(--bn-line-faint);
}
.related-row:last-child { border-bottom: none; }
.related-title { font-size: var(--bn-text-sm); color: var(--bn-ink); font-weight: 500; line-height: 1.4; }
.related-meta { font-family: var(--bn-font-mono); font-size: 10px; color: var(--bn-ink-3); }

</style>
</head>
<body>

<div class="bn-app" id="app"></div>

<script src="../chrome.js"></script>
<script>
const body = `
  <div class="bn-page-main pd-stack" data-screen-label="Post Detail">

    <!-- Back -->
    <a class="pd-back" href="space-home.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"/></svg>
      Back to <strong style="color:var(--bn-ink-2);">Engineering</strong>

    <!-- ════════ HERO POST ════════ -->
    <article class="pd-hero" data-comment-anchor="post-hero">
      <div class="pd-hero-head">
        <div class="bn-avatar" data-size="lg" data-presence="online">TN</div>
        <div style="flex:1;">
          <div class="pd-hero-author">Theo Nguyen <span class="bn-badge" data-tone="jetonomy">Discussion</span> <span class="bn-badge" data-tone="accent">OP</span></div>
          <div class="pd-hero-meta">
            <a href="user-profile.html">@theo</a><span class="sep">·</span>
            <span>Posted 8h ago</span><span class="sep">·</span>
            <span>in <a href="space-home.html">Engineering</a></span><span class="sep">·</span>
            <span>Public</span>
          </div>
        </div>
        <button class="bn-btn" data-variant="secondary" data-size="sm">Follow thread</button>
        <button class="bn-btn" data-variant="ghost" data-size="sm">⋯</button>
      </div>

      <h1 class="pd-hero-title">How are you handling SSE backpressure on shared hosting?</h1>

      <div class="pd-hero-body">
        <p>I've been chasing intermittent <code>connection reset</code> errors for two weeks on a handful of customer sites — all on shared hosting with caps on long-lived connections (typically 5 minutes, sometimes less). I'm running into limits using SSE for real-time post updates and presence in BuddyNext.</p>
        <p>Specifically: when 30+ members join a space at once, the host's connection pool fills up and new SSE connections start hanging. Reverse-proxy keepalive doesn't help because it's the upstream PHP process count that's the bottleneck.</p>
        <p>Two paths I'm weighing:</p>
        <ol style="padding-left: 20px; line-height: 1.7;">
          <li><strong>Long-polling fallback</strong> — degrade gracefully when SSE is unavailable. Adds polling load but works everywhere.</li>
          <li><strong>Server-capability gate</strong> — detect on activation, disable SSE features on shared hosts, recommend the customer upgrade their plan.</li>
        </ol>
        <p>I've also seen <a href="#">this blog post</a> suggesting a service-worker proxy that fans out a single connection across tabs — slick but adds a moving part.</p>
        <blockquote>Curious whether folks are falling back to long-polling, or just gating SSE behind a server-capability check. What's working for you?</blockquote>
      </div>

      <div class="pd-react-row">
        <div class="reactions">
          <span class="reaction" data-mine="true">👍 17</span>
          <span class="reaction">🤔 11</span>
          <span class="reaction">🔖 8</span>
          <span class="reaction">🚀 4</span>
          <button class="reaction-add" aria-label="Add reaction"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg></button>
        </div>
      </div>

      <div class="pd-stats">
        <div>
          <div class="pd-stat-num">31</div>
          <div class="pd-stat-label">Replies</div>
        </div>
        <div>
          <div class="pd-stat-num">2,418</div>
          <div class="pd-stat-label">Views</div>
        </div>
        <div>
          <div class="pd-stat-num">14</div>
          <div class="pd-stat-label">Followers</div>
        </div>
        <div>
          <div class="pd-stat-num">3</div>
          <div class="pd-stat-label">Cross-posts</div>
        </div>
      </div>

      <div class="pd-hero-actions">
        <button class="bn-btn" data-variant="secondary"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 11.5a8.4 8.4 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.4 8.4 0 01-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.4 8.4 0 013.8-.9h.5a8.5 8.5 0 018 8v.5z"/></svg> Reply</button>
        <button class="bn-btn" data-variant="ghost"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 12v7a2 2 0 002 2h12a2 2 0 002-2v-7M16 6l-4-4-4 4M12 2v13"/></svg> Share</button>
        <button class="bn-btn" data-variant="ghost"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg> Save</button>
      </div>
    </article>

    <!-- ════════ BEST ANSWER ════════ -->
    <article class="pd-answer" data-comment-anchor="best-answer">
      <div class="pd-answer-tag">Best answer · marked by Theo</div>

      <div class="reply" style="gap:var(--bn-s3);">
        <div class="bn-avatar" data-size="md" data-presence="online">VS</div>
        <div class="reply-body">
          <div class="reply-head">
            <span class="reply-author">Varun Singh</span>
            <span class="bn-badge" data-tone="success">Maintainer</span>
            <span class="reply-time">7h ago</span>
          </div>
          <div class="reply-text" style="font-size: var(--bn-text-base); line-height: 1.65;">
            <p>Both — but in this order:</p>
            <ol style="padding-left: 20px; line-height: 1.7; margin: var(--bn-s2) 0;">
              <li><strong>Detect at activation.</strong> We probe <code>SSE-able</code> by opening a 6-second test stream during plugin install. If it dies before 5s, we mark the site <code>realtime: polling</code> in <code>options</code>.</li>
              <li><strong>Polling fallback at 8s.</strong> The client tries SSE first, falls back to a 4s long-poll if the first event hasn't landed in 8s.</li>
              <li><strong>Don't gate features.</strong> The user-facing UI is identical; only the engine differs. Polling is "good enough" up to ~200 concurrent users per space.</li>
            </ol>
            <p>The service-worker proxy is real but be careful with iOS — it killed Safari sessions for us until we added a heartbeat under 30s.</p>
          </div>
          <div class="reply-actions">
            <span class="reply-action liked"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 12.7c0 4.6-8 9.5-8 9.5s-8-4.9-8-9.5C4 8.6 7.6 5 11.5 5c.5 0 1 .1 1.5.2.5-.2 1-.2 1.5-.2C18.4 5 22 8.6 20 12.7z"/></svg> 42</span>
            <span class="reply-action"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 11.5a8.4 8.4 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.4 8.4 0 01-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.4 8.4 0 013.8-.9h.5a8.5 8.5 0 018 8v.5z"/></svg> 6 replies</span>

    <!-- ════════ SORT BAR ════════ -->
    <div class="pd-sort-bar">

      <div class="pd-sort">
        <span class="pd-sort-opt" aria-current="true">Top</span>
        <span class="pd-sort-opt">New</span>
        <span class="pd-sort-opt">Old</span>
      </div>
    </div>

    <!-- ════════ REPLY COMPOSER ════════ -->
    <div class="pd-reply">
      <div class="bn-avatar" data-size="md" data-presence="online">VR</div>
      <div class="pd-reply-input">
        <textarea placeholder="Add to the discussion…" rows="2"></textarea>
        <div class="pd-reply-tools">
          <button class="pd-reply-tool" title="Image"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/></svg></button>
