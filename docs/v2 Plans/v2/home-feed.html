<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuddyNext — Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">

<style>
/* ─── Page-specific: home feed ─── */
.feed-stack { display: flex; flex-direction: column; gap: var(--bn-s4); }

/* Composer */
.composer {
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-lg);
  padding: var(--bn-s4) var(--bn-s5) var(--bn-s3);
  display: flex; gap: var(--bn-s3);
  align-items: flex-start;
}
.composer-input {
  flex: 1;
  display: flex; flex-direction: column; gap: var(--bn-s3);
}
.composer-prompt {
  width: 100%;
  border: none;
  background: transparent;
  font-family: var(--bn-font-ui);
  font-size: var(--bn-text-base);
  color: var(--bn-ink);
  resize: none;
  padding: 6px 0;
  line-height: 1.5;
}
.composer-prompt:focus { outline: none; }
.composer-prompt::placeholder { color: var(--bn-ink-3); }
.composer-tools {
  display: flex; align-items: center;
  gap: var(--bn-s2);
  padding-top: var(--bn-s3);
  border-top: 1px solid var(--bn-line-faint);
}
.composer-tool {
  width: 32px; height: 32px;
  border-radius: var(--bn-r-md);
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--bn-ink-3);
  transition: background var(--bn-dur-fast) var(--bn-ease), color var(--bn-dur-fast) var(--bn-ease);
}
.composer-tool:hover { background: var(--bn-sunken); color: var(--bn-ink); }
.composer-tool svg { width: 18px; height: 18px; stroke-width: 1.75; }
.composer-tool[data-tone="ai"] { color: var(--bn-accent); }
.composer-spacer { flex: 1; }
.composer-where {
  font-size: var(--bn-text-xs);
  color: var(--bn-ink-3);
  display: flex; align-items: center; gap: 6px;
}
.composer-where strong { color: var(--bn-ink-2); font-weight: 600; }

/* Feed tabs */
.feed-tabs {
  display: flex;
  border-bottom: 1px solid var(--bn-line);
  gap: var(--bn-s5);
  margin: 0 0 var(--bn-s2);
}
.feed-tab {
  padding: var(--bn-s3) 0;
  font-size: var(--bn-text-sm);
  font-weight: 550;
  color: var(--bn-ink-3);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color var(--bn-dur-fast) var(--bn-ease), border-color var(--bn-dur-fast) var(--bn-ease);
  display: flex; align-items: center; gap: 6px;
}
.feed-tab:hover { color: var(--bn-ink); }
.feed-tab[aria-current="true"] { color: var(--bn-ink); border-color: var(--bn-accent); }
.feed-tab .count {
  font-size: 10px;
  background: var(--bn-sunken);
  color: var(--bn-ink-3);
  padding: 1px 6px;
  border-radius: var(--bn-r-full);
  font-weight: 600;
}
.feed-tab[aria-current="true"] .count { background: var(--bn-accent-100); color: var(--bn-accent-700); }

/* Post card */
.post {
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-lg);
  padding: var(--bn-s5);
  display: flex; flex-direction: column; gap: var(--bn-s4);
  transition: border-color var(--bn-dur) var(--bn-ease);
}
.post:hover { border-color: var(--bn-line-strong); }
.post-head { display: flex; gap: var(--bn-s3); align-items: center; }
.post-author {
  font-size: var(--bn-text-sm);
  font-weight: 600;
  color: var(--bn-ink);
  display: flex; align-items: center; gap: 6px;
}
.post-meta {
  font-size: var(--bn-text-xs);
  color: var(--bn-ink-3);
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap;
}
.post-meta a { color: var(--bn-ink-2); font-weight: 500; }
.post-meta .sep { color: var(--bn-ink-4); }
.post-menu {
  width: 28px; height: 28px;
  border-radius: var(--bn-r-md);
  color: var(--bn-ink-3);
  display: inline-flex; align-items: center; justify-content: center;
  transition: background var(--bn-dur-fast) var(--bn-ease);
}
.post-menu:hover { background: var(--bn-sunken); color: var(--bn-ink); }
.post-menu svg { width: 16px; height: 16px; }
.post-body { font-size: var(--bn-text-base); line-height: 1.55; color: var(--bn-ink); }
.post-body a { color: var(--bn-accent); }
.post-actions {
  display: flex; gap: var(--bn-s5);
  padding-top: var(--bn-s3);
  border-top: 1px solid var(--bn-line-faint);
  align-items: center;
}
.post-action {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: var(--bn-text-sm);
  color: var(--bn-ink-3);
  cursor: pointer;
  transition: color var(--bn-dur-fast) var(--bn-ease);
  padding: 4px 8px;
  margin: -4px -8px;
  border-radius: var(--bn-r-sm);
}
.post-action:hover { color: var(--bn-accent); background: var(--bn-sunken); }
.post-action svg { width: 16px; height: 16px; stroke-width: 1.75; }
.post-action.liked { color: var(--bn-danger); }

/* Embed in post */
.embed {
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-md);
  background: var(--bn-sunken);
  overflow: hidden;
}
.embed-head {
  display: flex; gap: var(--bn-s3);
  padding: var(--bn-s3) var(--bn-s4);
}
.embed-thumb {
  width: 64px; height: 64px;
  border-radius: var(--bn-r-sm);
  background: linear-gradient(135deg, var(--bn-accent-100), var(--bn-accent-200));
  flex-shrink: 0;
}
.embed-body { flex: 1; min-width: 0; }
.embed-title { font-weight: 600; font-size: var(--bn-text-sm); margin-bottom: 2px; }
.embed-meta { font-size: var(--bn-text-xs); color: var(--bn-ink-3); }
.embed-domain {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--bn-font-mono);
  font-size: 10px;
  color: var(--bn-ink-3);
}

/* Image media */
.post-media {
  border-radius: var(--bn-r-md);
  overflow: hidden;
  background: var(--bn-sunken);
  aspect-ratio: 16/9;
  position: relative;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--bn-font-mono);
  font-size: var(--bn-text-xs);
  color: var(--bn-ink-3);
  background-image: repeating-linear-gradient(
    -45deg,
    var(--bn-sunken),
    var(--bn-sunken) 8px,
    var(--bn-line-faint) 8px,
    var(--bn-line-faint) 16px
  );
}

/* Voice room banner */
.voice-banner {
  display: flex; align-items: center;
  gap: var(--bn-s3);
  padding: var(--bn-s3) var(--bn-s4);
  background: linear-gradient(135deg, var(--bn-accent-100), var(--bn-jetonomy-bg));
  border: 1px solid var(--bn-accent-200);
  border-radius: var(--bn-r-md);
}
.voice-pulse {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--bn-success);
  position: relative;
  flex-shrink: 0;
}
.voice-pulse::after {
  content: ''; position: absolute; inset: -4px;
  border-radius: 50%;
  border: 2px solid var(--bn-success);
  animation: vp 2s var(--bn-ease) infinite;
}
@keyframes vp { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
.voice-title { font-weight: 600; font-size: var(--bn-text-sm); }
.voice-sub { font-size: var(--bn-text-xs); color: var(--bn-ink-3); }
.voice-stack { display: flex; }
.voice-stack .bn-avatar { margin-left: -8px; border: 2px solid var(--bn-surface); }
.voice-stack .bn-avatar:first-child { margin-left: 0; }

/* Reaction bar */
.reactions { display: flex; gap: 4px; flex-wrap: wrap; }
.reaction {
  display: inline-flex; align-items: center; gap: 4px;
  height: 26px; padding: 0 8px;
  border-radius: var(--bn-r-full);
  background: var(--bn-sunken);
  font-size: var(--bn-text-xs);
  font-weight: 600;
  color: var(--bn-ink-2);
  border: 1px solid transparent;
  transition: border-color var(--bn-dur-fast) var(--bn-ease);
}
.reaction:hover { border-color: var(--bn-accent); }
.reaction[data-mine="true"] { background: var(--bn-accent-100); color: var(--bn-accent-700); }
.reaction-add {
  width: 26px; height: 26px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--bn-r-full);
  background: var(--bn-sunken);
  color: var(--bn-ink-3);
}
.reaction-add svg { width: 14px; height: 14px; stroke-width: 2; }

/* AI summary tag */
.ai-summary {
  background: linear-gradient(135deg, color-mix(in oklch, var(--bn-accent-50), var(--bn-jetonomy-bg)), var(--bn-surface));
  border: 1px solid var(--bn-accent-200);
  border-radius: var(--bn-r-md);
  padding: var(--bn-s3) var(--bn-s4);
  display: flex; gap: var(--bn-s3); align-items: flex-start;
  font-size: var(--bn-text-sm);
  color: var(--bn-ink-2);
}
.ai-summary-icon {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--bn-accent), var(--bn-jetonomy));
  flex-shrink: 0;
}
.ai-summary-label {
  font-family: var(--bn-font-mono);
  font-size: 10px;
  color: var(--bn-accent-700);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
  margin-bottom: 2px;
}

/* Federated tag */
.federated {
  display: inline-flex; align-items: center;
  gap: 6px;
  font-size: var(--bn-text-xs);
  color: var(--bn-ink-3);
  font-weight: 500;
}
.federated::before {
  content: ''; width: 6px; height: 6px;
  border-radius: 50%; background: var(--bn-info);
}

/* Aside cards */
.aside-card {
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-lg);
  padding: var(--bn-s4);
}
.aside-title {
  font-family: var(--bn-font-display);
  font-size: var(--bn-text-sm);
  font-weight: 600;
  color: var(--bn-ink);
  margin-bottom: var(--bn-s3);
  display: flex; justify-content: space-between; align-items: center;
}
.aside-title a { font-size: var(--bn-text-xs); font-weight: 500; }

.suggested-list { display: flex; flex-direction: column; gap: var(--bn-s2); }
.suggested-row {
  display: flex; align-items: center; gap: var(--bn-s3);
}
.suggested-info { flex: 1; min-width: 0; }
.suggested-name { font-size: var(--bn-text-sm); font-weight: 600; line-height: 1.3; }
.suggested-meta { font-size: var(--bn-text-xs); color: var(--bn-ink-3); }

.tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-list a {
  font-size: var(--bn-text-xs);
  font-weight: 600;
  padding: 4px 10px;
  background: var(--bn-sunken);
  border-radius: var(--bn-r-full);
  color: var(--bn-ink-2);
  transition: background var(--bn-dur-fast) var(--bn-ease);
}
.tag-list a:hover { background: var(--bn-accent-100); color: var(--bn-accent-700); }

.event-row {
  display: flex; gap: var(--bn-s3);
  padding: var(--bn-s2) 0;
  border-bottom: 1px solid var(--bn-line-faint);
}
.event-row:last-child { border-bottom: none; }
.event-date {
  text-align: center;
  width: 40px;
  flex-shrink: 0;
}
.event-month {
  font-size: 10px; font-weight: 600;
  color: var(--bn-events);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.event-day {
  font-family: var(--bn-font-display);
  font-size: var(--bn-text-xl);
  font-weight: 600;
  line-height: 1;
  color: var(--bn-ink);
}
.event-info { flex: 1; min-width: 0; }
.event-title { font-size: var(--bn-text-sm); font-weight: 600; line-height: 1.3; }
.event-meta { font-size: var(--bn-text-xs); color: var(--bn-ink-3); margin-top: 2px; }

.welcome-streak {
  display: flex; gap: 6px;
  margin-top: var(--bn-s3);
}
.streak-day {
  flex: 1; aspect-ratio: 1;
  border-radius: var(--bn-r-sm);
  background: var(--bn-sunken);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  font-weight: 600;
  color: var(--bn-ink-3);
}
.streak-day[data-active] { background: var(--bn-accent); color: var(--bn-accent-fg); }
.streak-day[data-today] { box-shadow: 0 0 0 2px var(--bn-canvas), 0 0 0 4px var(--bn-accent); }
</style>
</head>
<body>

<div class="bn-app" id="app"></div>
