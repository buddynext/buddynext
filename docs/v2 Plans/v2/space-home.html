<!DOCTYPE html>
<html lang="en" data-bn-theme="light" data-bn-density="comfortable">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuddyNext — Design space</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">

<style>
/* ─── Page-specific: space home ─── */

/* Hero/cover */
.space-hero {
  position: relative;
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-lg);
  overflow: hidden;
}
.space-cover {
  height: 180px;
  background:
    radial-gradient(circle at 18% 30%, color-mix(in oklch, var(--bn-accent) 30%, transparent), transparent 55%),
    radial-gradient(circle at 78% 75%, color-mix(in oklch, var(--bn-jetonomy) 28%, transparent), transparent 50%),
    linear-gradient(135deg, var(--bn-accent-100), var(--bn-sunken));
  position: relative;
  overflow: hidden;
}
.space-cover::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    -42deg,
    transparent 0 22px,
    color-mix(in oklch, var(--bn-ink) 4%, transparent) 22px 23px
  );
  opacity: 0.6;
  mix-blend-mode: multiply;
}
.space-cover-tag {
  position: absolute;
  top: var(--bn-s4); right: var(--bn-s5);
  font-family: var(--bn-font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--bn-ink-3);
  background: var(--bn-surface);
  padding: 4px 8px;
  border-radius: var(--bn-r-sm);
  border: 1px solid var(--bn-line);
}

.space-head-inner {
  padding: 0 var(--bn-s6) var(--bn-s5);
  display: flex; align-items: flex-end;
  gap: var(--bn-s5);
  position: relative;
}
.space-emblem {
  width: 96px; height: 96px;
  margin-top: -36px;
  background: var(--bn-surface);
  border: 4px solid var(--bn-surface);
  border-radius: var(--bn-r-lg);
  box-shadow: var(--bn-shadow-md);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--bn-font-display);
  font-size: 38px;
  font-weight: 700;
  color: var(--bn-accent);
  background-image: linear-gradient(135deg, var(--bn-accent-100), var(--bn-surface));
  flex-shrink: 0;
}
.space-info {
  flex: 1;
  padding-bottom: 4px;
  min-width: 0;
}
.space-name {
  font-family: var(--bn-font-display);
  font-size: var(--bn-text-2xl);
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--bn-ink);
  display: flex; align-items: center; gap: var(--bn-s2);
  margin-bottom: 4px;
  flex-wrap: wrap;
}
.space-name .bn-badge { font-size: 10px; white-space: nowrap; }
.space-handle {
  font-family: var(--bn-font-mono);
  font-size: var(--bn-text-xs);
  color: var(--bn-ink-3);
}
.space-meta {
  display: flex; align-items: center;
  gap: var(--bn-s4);
  font-size: var(--bn-text-xs);
  color: var(--bn-ink-3);
  margin-top: var(--bn-s2);
  flex-wrap: wrap;
}
.space-meta b { color: var(--bn-ink); font-weight: 600; }
.space-meta .sep { color: var(--bn-ink-4); }
.space-actions {
  display: flex; align-items: center;
  gap: var(--bn-s2);
  padding-bottom: 4px;
  flex-shrink: 0;
}

/* Tabs */
.space-tabs {
  display: flex; align-items: center;
  gap: var(--bn-s5);
  padding: 0 var(--bn-s6);
  border-top: 1px solid var(--bn-line);
}
.stab {
  padding: var(--bn-s3) 0;
  font-size: var(--bn-text-sm);
  font-weight: 550;
  color: var(--bn-ink-3);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  display: flex; align-items: center; gap: 6px;
  transition: color var(--bn-dur-fast) var(--bn-ease), border-color var(--bn-dur-fast) var(--bn-ease);
}
.stab:hover { color: var(--bn-ink); }
.stab[aria-current="true"] { color: var(--bn-ink); border-color: var(--bn-accent); font-weight: 600; }
.stab .count {
  font-size: 10px;
  background: var(--bn-sunken);
  color: var(--bn-ink-3);
  padding: 1px 6px;
  border-radius: var(--bn-r-full);
  font-weight: 600;
  font-family: var(--bn-font-mono);
}
.stab[aria-current="true"] .count { background: var(--bn-accent-100); color: var(--bn-accent-700); }
.stab .new {
  width: 6px; height: 6px;
  background: var(--bn-accent);
  border-radius: 50%;
}

/* Section start: pinned, composer copy */
.section-label {
  display: flex; align-items: center;
  gap: var(--bn-s2);
  font-family: var(--bn-font-mono);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--bn-ink-3);
  margin: var(--bn-s2) 0 var(--bn-s3);
}
.section-label::before {
  content: '';
  width: 12px; height: 1px;
  background: var(--bn-line-strong);
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--bn-line);
}

/* Pinned card */
.pinned {
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-lg);
  padding: var(--bn-s5);
  display: flex; flex-direction: column; gap: var(--bn-s3);
  position: relative;
}
.pinned::before {
  content: '';
  position: absolute;
  top: 0; left: var(--bn-s5);
  width: 32px;
  height: 3px;
  background: var(--bn-paid);
  border-radius: 0 0 2px 2px;
}
.pinned-head {
  display: flex; align-items: center; gap: var(--bn-s2);
  font-family: var(--bn-font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--bn-paid);
  font-weight: 600;
}
.pinned-head svg { width: 12px; height: 12px; }
.pinned-title {
  font-family: var(--bn-font-display);
  font-size: var(--bn-text-lg);
  font-weight: 600;
  color: var(--bn-ink);
}
.pinned-body {
  font-size: var(--bn-text-sm);
  color: var(--bn-ink-2);
  line-height: 1.55;
}
.pinned-foot {
  display: flex; align-items: center;
  gap: var(--bn-s4);
  font-size: var(--bn-text-xs);
  color: var(--bn-ink-3);
  padding-top: var(--bn-s3);
  border-top: 1px solid var(--bn-line-faint);
}

/* Composer (compact, scoped to space) */
.composer-mini {
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-lg);
  padding: var(--bn-s3) var(--bn-s4);
  display: flex; align-items: center; gap: var(--bn-s3);
  cursor: text;
  transition: border-color var(--bn-dur-fast) var(--bn-ease);
}
.composer-mini:hover { border-color: var(--bn-line-strong); }
.composer-mini-input {
  flex: 1;
  font-size: var(--bn-text-sm);
  color: var(--bn-ink-3);
}
.composer-mini-tools {
  display: flex; gap: var(--bn-s1);
  color: var(--bn-ink-4);
}
.composer-mini-tools button {
  width: 30px; height: 30px;
  border-radius: var(--bn-r-sm);
  display: inline-flex; align-items: center; justify-content: center;
  transition: background var(--bn-dur-fast) var(--bn-ease), color var(--bn-dur-fast) var(--bn-ease);
}
.composer-mini-tools button:hover { background: var(--bn-sunken); color: var(--bn-ink); }
.composer-mini-tools svg { width: 16px; height: 16px; stroke-width: 1.75; }

/* Filter bar */
.filter-bar {
  display: flex; align-items: center;
  gap: var(--bn-s3);
  padding: var(--bn-s2) 0 var(--bn-s2);
  font-size: var(--bn-text-xs);
}
.filter-segment {
  display: inline-flex;
  background: var(--bn-sunken);
  border-radius: var(--bn-r-md);
  padding: 2px;
}
.filter-segment button {
  padding: 5px 12px;
  font-size: var(--bn-text-xs);
  font-weight: 600;
  color: var(--bn-ink-3);
  border-radius: var(--bn-r-sm);
  transition: background var(--bn-dur-fast) var(--bn-ease), color var(--bn-dur-fast) var(--bn-ease);
}
.filter-segment button[aria-current="true"] {
  background: var(--bn-surface);
  color: var(--bn-ink);
  box-shadow: var(--bn-shadow-sm);
}
.filter-spacer { flex: 1; }
.filter-link {
  display: inline-flex; align-items: center; gap: 4px;
  color: var(--bn-ink-3);
  font-weight: 500;
}
.filter-link:hover { color: var(--bn-ink); }
.filter-link svg { width: 14px; height: 14px; }

/* Post (lighter version, reused vibe from feed) */
.post {
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-lg);
  padding: var(--bn-s5);
  display: flex; flex-direction: column; gap: var(--bn-s3);
}
.post-head { display: flex; gap: var(--bn-s3); align-items: center; }
.post-author {
  font-size: var(--bn-text-sm);
  font-weight: 600; color: var(--bn-ink);
  display: flex; align-items: center; gap: 6px;
}
.post-meta {
  font-size: var(--bn-text-xs);
  color: var(--bn-ink-3);
  display: flex; align-items: center; gap: 6px;
}
.post-meta .sep { color: var(--bn-ink-4); }
.post-body {
  font-size: var(--bn-text-base);
  line-height: 1.55;
  color: var(--bn-ink);
}
.post-body a { color: var(--bn-accent); }
.post-actions {
  display: flex; align-items: center;
  gap: var(--bn-s5);
  padding-top: var(--bn-s2);
  font-size: var(--bn-text-sm);
  color: var(--bn-ink-3);
}
.post-action {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 8px;
  margin: -4px -8px;
  border-radius: var(--bn-r-sm);
  transition: color var(--bn-dur-fast) var(--bn-ease), background var(--bn-dur-fast) var(--bn-ease);
}
.post-action:hover { color: var(--bn-accent); background: var(--bn-sunken); }
.post-action svg { width: 16px; height: 16px; stroke-width: 1.75; }

/* Reply preview attached to post */
.replies-preview {
  margin-top: var(--bn-s2);
  padding: var(--bn-s3);
  background: var(--bn-sunken);
  border-radius: var(--bn-r-md);
  display: flex; flex-direction: column; gap: var(--bn-s2);
}
.reply {
  display: flex; gap: var(--bn-s2);
  font-size: var(--bn-text-sm);
}
.reply-author { font-weight: 600; color: var(--bn-ink); margin-right: 6px; }
.reply-body { color: var(--bn-ink-2); line-height: 1.5; }
.replies-more {
  font-size: var(--bn-text-xs);
  color: var(--bn-accent);
  font-weight: 500;
  margin-top: 2px;
}

/* Aside cards */
.aside-card {
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-lg);
  padding: var(--bn-s4);
}
.aside-title {
  font-family: var(--bn-font-display);
  font-size: var(--bn-text-sm);
  font-weight: 600;
  color: var(--bn-ink);
  margin-bottom: var(--bn-s3);
  display: flex; justify-content: space-between; align-items: center;
}
.aside-title a { font-size: var(--bn-text-xs); font-weight: 500; }

/* About card */
.about-card .about-line {
  font-size: var(--bn-text-sm);
  color: var(--bn-ink-2);
  line-height: 1.55;
}
.about-stat-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--bn-s3);
  margin-top: var(--bn-s3);
  padding-top: var(--bn-s3);
  border-top: 1px solid var(--bn-line-faint);
}
.about-stat .num {
  font-family: var(--bn-font-display);
  font-size: var(--bn-text-xl);
  font-weight: 600;
  color: var(--bn-ink);
  letter-spacing: -0.02em;
}
.about-stat .label {
  font-family: var(--bn-font-mono);
  font-size: 10px;
  color: var(--bn-ink-3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 2px;
}

/* Member list */
.member-list { display: flex; flex-direction: column; gap: var(--bn-s2); }
.member-row {
  display: flex; align-items: center; gap: var(--bn-s3);
  padding: 6px 0;
}
.member-info { flex: 1; min-width: 0; }
.member-name {
  font-size: var(--bn-text-sm);
  font-weight: 600;
  color: var(--bn-ink);
  display: flex; align-items: center; gap: 4px;
}
.member-meta {
  font-size: var(--bn-text-xs);
  color: var(--bn-ink-3);
}
.member-role {
  font-family: var(--bn-font-mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--bn-ink-4);
}

/* Resource links */
.resource-list { display: flex; flex-direction: column; gap: var(--bn-s2); }
.resource-row {
  display: flex; align-items: center; gap: var(--bn-s3);
  padding: var(--bn-s2) var(--bn-s2);
  margin: 0 calc(-1 * var(--bn-s2));
  border-radius: var(--bn-r-md);
  transition: background var(--bn-dur-fast) var(--bn-ease);
}
.resource-row:hover { background: var(--bn-sunken); }
.resource-icon {
  width: 32px; height: 32px;
  border-radius: var(--bn-r-md);
  background: var(--bn-sunken);
  color: var(--bn-ink-2);
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.resource-icon svg { width: 16px; height: 16px; stroke-width: 1.75; }
.resource-info { flex: 1; min-width: 0; }
.resource-name {
  font-size: var(--bn-text-sm);
  font-weight: 500;
  color: var(--bn-ink);
}
.resource-meta {
  font-size: var(--bn-text-xs);
  color: var(--bn-ink-3);
}

/* Voice room mini */
.voice-mini {
  background: linear-gradient(135deg, var(--bn-accent-100), var(--bn-jetonomy-bg));
  border: 1px solid var(--bn-accent-200);
  border-radius: var(--bn-r-lg);
  padding: var(--bn-s4);
  display: flex; flex-direction: column; gap: var(--bn-s2);
}
.voice-mini-head {
  display: flex; align-items: center; gap: var(--bn-s2);
  font-family: var(--bn-font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--bn-accent-700);
  font-weight: 600;
}
.voice-mini-pulse {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--bn-success);
  position: relative;
}
.voice-mini-pulse::after {
  content: ''; position: absolute; inset: -4px;
  border-radius: 50%;
  border: 2px solid var(--bn-success);
  animation: vp 2s var(--bn-ease) infinite;
}
@keyframes vp { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
.voice-mini-title {
  font-size: var(--bn-text-sm);
  font-weight: 600;
  color: var(--bn-ink);
}
.voice-mini-stack {
  display: flex; align-items: center;
  gap: var(--bn-s3);
}
.voice-mini-faces {
  display: flex; flex: 1;
}
.voice-mini-faces .bn-avatar {
  margin-left: -8px;
  border: 2px solid var(--bn-surface);
}
.voice-mini-faces .bn-avatar:first-child { margin-left: 0; }

/* Member lounge / activity strip */
.activity-strip {
  display: flex;
  flex-direction: column;
  gap: var(--bn-s2);
  font-size: var(--bn-text-xs);
  color: var(--bn-ink-3);
}
.activity-line {
  display: flex; gap: var(--bn-s2);
  align-items: baseline;
}
.activity-time {
  font-family: var(--bn-font-mono);
  font-size: 10px;
  color: var(--bn-ink-4);
  flex-shrink: 0;
  width: 32px;
}
.activity-text { flex: 1; line-height: 1.45; color: var(--bn-ink-2); }
.activity-text b { color: var(--bn-ink); font-weight: 600; }
.activity-text a { color: var(--bn-accent); }
</style>
</head>
<body>

<div class="bn-app" id="app"></div>

<script src="../chrome.js"></script>
<script>
