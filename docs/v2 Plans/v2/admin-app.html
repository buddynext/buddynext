<!DOCTYPE html>
<html lang="en" data-bn-theme="light" data-bn-density="comfortable">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuddyNext — Admin (full navigable prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<style>
/* Full navigable admin prototype — HTML/CSS/JS only, NO plugin code.
   Covers every section/tab (data-driven), with ⌘K search + per-screen docs links. */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--bn-font-ui);background:var(--bn-canvas);color:var(--bn-ink);font-size:var(--bn-text-sm);
  display:grid;grid-template-columns:200px 248px 1fr;min-height:100vh}
svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;flex:none}
a{color:inherit;text-decoration:none}

/* faux WP rail */
.wp-rail{background:#1d2327;color:#c3c4c7;font:13px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:var(--bn-s3) 0;position:sticky;top:0;height:100vh;overflow-y:auto}
.wp-rail-brand{padding:14px 18px;font-size:17px;font-weight:600;color:#fff;border-bottom:1px solid #2c3338;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.wp-rail-item{display:flex;align-items:center;gap:10px;padding:8px 18px;color:#c3c4c7;cursor:pointer;border-left:3px solid transparent}
.wp-rail-item:hover{color:#3a9fd6}.wp-rail-item.on{background:#0073aa;color:#fff;border-left-color:#3a9fd6}
.wp-rail-item svg{width:16px;height:16px;opacity:.85}

/* in-page settings nav */
.nav{border-right:1px solid var(--bn-line);background:var(--bn-surface);padding:var(--bn-s4) var(--bn-s3);overflow-y:auto;position:sticky;top:0;height:100vh}
.nav-search{display:flex;align-items:center;gap:8px;border:1px solid var(--bn-line);border-radius:var(--bn-r-md);padding:8px 10px;color:var(--bn-ink-3);margin-bottom:var(--bn-s4);font-size:var(--bn-text-xs);cursor:pointer;background:var(--bn-canvas)}
.nav-search kbd{margin-left:auto;font-family:var(--bn-font-mono);font-size:10px;background:var(--bn-surface);border:1px solid var(--bn-line);border-radius:4px;padding:1px 5px}
.grp{margin-bottom:var(--bn-s4)}
.grp-h{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--bn-ink-3);padding:0 8px var(--bn-s2)}
.grp-h .pro{font-size:9px;background:var(--bn-paid-bg,var(--bn-accent-50));color:var(--bn-paid,var(--bn-accent-700));padding:1px 6px;border-radius:var(--bn-r-full);font-weight:700}
.lnk{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:var(--bn-r-md);color:var(--bn-ink-2);cursor:pointer;font-size:var(--bn-text-sm);font-weight:500}
.lnk svg{width:15px;height:15px;color:var(--bn-ink-3)}
.lnk:hover{background:var(--bn-canvas);color:var(--bn-ink)}
.lnk.on{background:var(--bn-accent-50);color:var(--bn-accent-700);font-weight:600}
.lnk.on svg{color:var(--bn-accent-600)}

/* main */
.main{min-width:0;overflow-y:auto;height:100vh}
.topbar{background:var(--bn-surface);border-bottom:1px solid var(--bn-line);padding:var(--bn-s3) var(--bn-s5);display:flex;align-items:center;gap:var(--bn-s3);position:sticky;top:0;z-index:10}
.crumb{display:flex;align-items:center;gap:6px;color:var(--bn-ink-2);font-size:var(--bn-text-sm)}
.crumb b{color:var(--bn-ink);font-weight:600}.crumb svg{width:12px;height:12px;color:var(--bn-ink-3)}
.sp{flex:1}
.tg{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--bn-line);background:var(--bn-surface);color:var(--bn-ink-2);border-radius:var(--bn-r-md);padding:6px 10px;cursor:pointer;font-size:var(--bn-text-xs)}
.tg:hover{background:var(--bn-canvas)}
.wrap{padding:var(--bn-s6) var(--bn-s8);max-width:960px}
@media(max-width:1200px){.wrap{padding:var(--bn-s5)}}

/* page head with docs/tutorial slots */
.phead{margin-bottom:var(--bn-s5)}
.phead-top{display:flex;align-items:flex-start;gap:var(--bn-s4)}
.phead h1{font-family:var(--bn-font-display);font-size:var(--bn-text-2xl);font-weight:700;letter-spacing:-.02em}
.phead p{color:var(--bn-ink-2);margin-top:4px;max-width:64ch}
.phead .links{margin-left:auto;display:flex;gap:var(--bn-s2);flex:none}
.dl{display:inline-flex;align-items:center;gap:6px;font-size:var(--bn-text-xs);font-weight:600;padding:6px 11px;border-radius:var(--bn-r-md);border:1px solid var(--bn-line);color:var(--bn-ink-2);cursor:pointer}
.dl:hover{background:var(--bn-surface);color:var(--bn-ink)}
.dl.vid{color:var(--bn-accent-700);border-color:var(--bn-accent-200)}

/* cards + fields */
.card{background:var(--bn-surface);border:1px solid var(--bn-line);border-radius:var(--bn-r-lg);box-shadow:var(--bn-shadow-xs);margin-bottom:var(--bn-s5);overflow:hidden}
.card-h{display:flex;align-items:center;gap:var(--bn-s3);padding:var(--bn-s4) var(--bn-s5);border-bottom:1px solid var(--bn-line-faint,var(--bn-line))}
.card-h .ico{width:30px;height:30px;border-radius:var(--bn-r-md);display:grid;place-items:center;background:var(--bn-accent-50);color:var(--bn-accent-600)}
.card-h h3{font-family:var(--bn-font-display);font-size:var(--bn-text-base);font-weight:600}
.card-h .d{color:var(--bn-ink-3);font-size:var(--bn-text-xs);margin-top:1px}
.card-h .help{margin-left:auto;color:var(--bn-ink-3);cursor:pointer}.card-h .help:hover{color:var(--bn-accent-600)}
.card.danger{border-color:var(--bn-danger)}.card.danger .card-h .ico{background:var(--bn-danger-bg);color:var(--bn-danger)}
.card-b{padding:0 var(--bn-s5)}
.fr{display:flex;align-items:center;gap:var(--bn-s5);padding:var(--bn-s4) 0;border-bottom:1px solid var(--bn-line-faint,var(--bn-line))}
.fr:last-child{border-bottom:0}
.fr .m{flex:1;min-width:0}.fr .m label{font-weight:600;font-size:var(--bn-text-sm);display:block}
.fr .m p{color:var(--bn-ink-2);font-size:var(--bn-text-xs);margin-top:2px}
.fr .c{flex:none}
input[type=text],select,textarea{font-family:inherit;font-size:var(--bn-text-sm);color:var(--bn-ink);background:var(--bn-canvas);border:1px solid var(--bn-line);border-radius:var(--bn-r-md);padding:8px 11px;min-width:240px}
textarea{min-height:64px;width:320px;resize:vertical}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--bn-accent);box-shadow:var(--bn-ring,0 0 0 3px var(--bn-accent-100))}
.sw{width:42px;height:24px;border-radius:var(--bn-r-full);background:var(--bn-accent);position:relative;cursor:pointer}
.sw::after{content:"";position:absolute;top:3px;inset-inline-start:21px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:var(--bn-shadow-sm)}
.sw.off{background:var(--bn-line-strong,var(--bn-line))}.sw.off::after{inset-inline-start:3px}
.swatch{width:38px;height:38px;border-radius:var(--bn-r-md);border:1px solid var(--bn-line);background:var(--bn-accent)}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:7px;font-family:inherit;font-size:var(--bn-text-sm);font-weight:600;padding:8px 14px;border-radius:var(--bn-r-md);border:1px solid transparent;cursor:pointer}
.btn svg{width:15px;height:15px}
.btn.pri{background:var(--bn-accent);color:var(--bn-accent-fg)}.btn.pri:hover{background:var(--bn-accent-600)}
.btn.gho{background:var(--bn-surface);border-color:var(--bn-line);color:var(--bn-ink)}.btn.gho:hover{background:var(--bn-canvas)}
.btn.dan{background:var(--bn-danger);color:#fff}
.btn:focus-visible{outline:none;box-shadow:var(--bn-ring,0 0 0 3px var(--bn-accent-100))}
.callout{display:flex;gap:10px;background:var(--bn-info-bg);border:1px solid color-mix(in oklch,var(--bn-info) 30%,transparent);border-radius:var(--bn-r-md);padding:var(--bn-s3) var(--bn-s4);margin-bottom:var(--bn-s5);font-size:var(--bn-text-xs)}
.callout svg{color:var(--bn-info)}

/* KPI (dashboard) */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--bn-s4);margin-bottom:var(--bn-s5)}
@media(max-width:1100px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--bn-surface);border:1px solid var(--bn-line);border-radius:var(--bn-r-lg);padding:var(--bn-s4);box-shadow:var(--bn-shadow-xs)}
.kpi .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.kpi .ti{width:34px;height:34px;border-radius:var(--bn-r-md);display:grid;place-items:center;background:var(--bn-accent-50);color:var(--bn-accent-600)}
.kpi .v{font-family:var(--bn-font-display);font-size:28px;font-weight:700;letter-spacing:-.02em}
.kpi .l{color:var(--bn-ink-3);font-size:var(--bn-text-xs);margin-top:2px}
.dl-up{font-family:var(--bn-font-mono);font-size:11px;color:var(--bn-success);background:var(--bn-success-bg);padding:2px 7px;border-radius:var(--bn-r-full);font-weight:600}

/* table (list) */
.toolbar{display:flex;gap:var(--bn-s2);margin-bottom:var(--bn-s4);align-items:center}
.toolbar .search{flex:1;max-width:280px;display:flex;align-items:center;gap:8px;border:1px solid var(--bn-line);border-radius:var(--bn-r-md);padding:7px 10px;color:var(--bn-ink-3);font-size:var(--bn-text-xs);background:var(--bn-surface)}
table{width:100%;border-collapse:collapse;font-size:var(--bn-text-sm);background:var(--bn-surface);border:1px solid var(--bn-line);border-radius:var(--bn-r-lg);overflow:hidden}
th{text-align:start;color:var(--bn-ink-3);font-size:var(--bn-text-xs);text-transform:uppercase;letter-spacing:.04em;padding:var(--bn-s3) var(--bn-s4);border-bottom:1px solid var(--bn-line)}
td{padding:var(--bn-s3) var(--bn-s4);border-bottom:1px solid var(--bn-line-faint,var(--bn-line))}
tr:last-child td{border-bottom:0}
.u{display:flex;align-items:center;gap:10px}
.av{width:30px;height:30px;border-radius:var(--bn-r-full);background:var(--bn-accent);color:var(--bn-accent-fg);display:grid;place-items:center;font-size:11px;font-weight:600}
.pill{font-size:var(--bn-text-xs);font-weight:600;padding:3px 9px;border-radius:var(--bn-r-full)}
.pill.ok{background:var(--bn-success-bg);color:var(--bn-success)}
.pill.warn{background:var(--bn-warn-bg);color:var(--bn-warn)}
.pill.mut{background:var(--bn-canvas);color:var(--bn-ink-3)}

/* shared pagination — used by EVERY large list (members, reports, logs, spaces, …) */
.pager{display:flex;align-items:center;gap:var(--bn-s4);padding:var(--bn-s3) var(--bn-s4);margin-top:var(--bn-s3);background:var(--bn-surface);border:1px solid var(--bn-line);border-radius:var(--bn-r-lg);font-size:var(--bn-text-xs);color:var(--bn-ink-2)}
.pager .info{color:var(--bn-ink-3)}
.pager .per{display:flex;align-items:center;gap:6px}
.pager .per select{min-width:0;padding:4px 8px}
.pager .sp{flex:1}
.pager .pgnav{display:flex;align-items:center;gap:4px}
.pgbtn{min-width:30px;height:30px;display:inline-grid;place-items:center;border:1px solid var(--bn-line);background:var(--bn-surface);border-radius:var(--bn-r-md);cursor:pointer;color:var(--bn-ink-2);font-weight:600;padding:0 8px;font-size:var(--bn-text-xs)}
.pgbtn:hover{background:var(--bn-canvas);color:var(--bn-ink)}
.pgbtn[aria-current]{background:var(--bn-accent);color:var(--bn-accent-fg);border-color:var(--bn-accent)}
.pgbtn[disabled]{opacity:.4;cursor:default}
.pgell{padding:0 2px;color:var(--bn-ink-3)}
@media(max-width:768px){.pager{flex-wrap:wrap}.pager .per{display:none}}

/* editor (split) */
.edit{display:grid;grid-template-columns:1fr 300px;gap:var(--bn-s5)}
@media(max-width:1100px){.edit{grid-template-columns:1fr}}
.meta-card{background:var(--bn-surface);border:1px solid var(--bn-line);border-radius:var(--bn-r-lg);padding:var(--bn-s4);height:fit-content}
.meta-card h4{font-size:var(--bn-text-xs);text-transform:uppercase;letter-spacing:.05em;color:var(--bn-ink-3);margin-bottom:var(--bn-s3)}

/* wizard */
.steps{display:flex;gap:var(--bn-s2);margin-bottom:var(--bn-s5)}
.step{flex:1;padding:var(--bn-s3);border:1px solid var(--bn-line);border-radius:var(--bn-r-md);background:var(--bn-surface);display:flex;gap:10px;align-items:center;font-size:var(--bn-text-xs)}
.step .n{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:var(--bn-canvas);color:var(--bn-ink-3);font-weight:700}
.step.on{border-color:var(--bn-accent)}.step.on .n{background:var(--bn-accent);color:var(--bn-accent-fg)}
.step.done .n{background:var(--bn-success);color:#fff}

/* save bar */
.savebar{position:sticky;bottom:var(--bn-s5);background:var(--bn-surface);border:1px solid var(--bn-line);border-radius:var(--bn-r-lg);box-shadow:var(--bn-shadow-md);padding:var(--bn-s3) var(--bn-s4);display:flex;align-items:center;gap:var(--bn-s3);margin-top:var(--bn-s5)}
.savebar .dot{width:8px;height:8px;border-radius:50%;background:var(--bn-warn)}.savebar .t{color:var(--bn-ink-2);font-size:var(--bn-text-xs)}

/* command palette */
.pal-bg{position:fixed;inset:0;background:rgba(15,18,25,.45);backdrop-filter:blur(2px);display:none;z-index:100;align-items:flex-start;justify-content:center;padding-top:12vh}
.pal-bg.show{display:flex}
.pal{width:560px;max-width:92vw;background:var(--bn-surface);border:1px solid var(--bn-line);border-radius:var(--bn-r-xl);box-shadow:var(--bn-shadow-lg);overflow:hidden}
.pal-in{display:flex;align-items:center;gap:10px;padding:var(--bn-s4) var(--bn-s5);border-bottom:1px solid var(--bn-line)}
.pal-in svg{color:var(--bn-ink-3)}
.pal-in input{border:0;background:transparent;font-size:var(--bn-text-lg);width:100%;color:var(--bn-ink);min-width:0}
.pal-in input:focus{outline:none;box-shadow:none}
.pal-list{max-height:52vh;overflow-y:auto;padding:var(--bn-s2)}
.pal-it{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--bn-r-md);cursor:pointer}
.pal-it .ti{width:28px;height:28px;border-radius:var(--bn-r-sm);display:grid;place-items:center;background:var(--bn-canvas);color:var(--bn-ink-3)}
.pal-it .lab{font-weight:600;font-size:var(--bn-text-sm)}
.pal-it .ctx{color:var(--bn-ink-3);font-size:var(--bn-text-xs);margin-left:auto;font-family:var(--bn-font-mono)}
.pal-it.sel,.pal-it:hover{background:var(--bn-accent-50)}.pal-it.sel .lab{color:var(--bn-accent-700)}
.pal-empty{padding:var(--bn-s6);text-align:center;color:var(--bn-ink-3);font-size:var(--bn-text-sm)}

@media(max-width:1024px){body{grid-template-columns:0 220px 1fr}.wp-rail{display:none}}
@media(max-width:768px){body{grid-template-columns:1fr}.nav{display:none}}
</style>
</head>
<body>

<nav class="wp-rail">
  <div class="wp-rail-brand"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 12 0v1"/></svg> BuddyNext</div>
  <div class="wp-rail-item on"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> BuddyNext</div>
  <div class="wp-rail-item"><svg viewBox="0 0 24 24"><path d="M12 20h9M3 20h2M5 20V8a2 2 0 0 1 2-2h2"/></svg> Posts</div>
  <div class="wp-rail-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82"/></svg> Settings</div>
</nav>

<!-- in-page IA nav (data-view routes) -->
<aside class="nav" id="nav"></aside>

<div class="main">
  <div class="topbar">
    <div class="crumb"><span>BuddyNext</span><svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg><b id="crumb">Overview</b></div>
    <div class="sp"></div>
    <button class="tg" id="palBtn"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg> Search <kbd style="font-family:var(--bn-font-mono);font-size:10px">⌘K</kbd></button>
  </div>
  <div class="wrap" id="screen"><!-- rendered by JS --></div>
</div>

<!-- command palette -->
<div class="pal-bg" id="palBg">
  <div class="pal">
    <div class="pal-in"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input id="palInput" placeholder="Search any setting, screen, or action…" autocomplete="off"></div>
    <div class="pal-list" id="palList"></div>
  </div>
</div>

<script>
// Lucide-ish inline icons by key
const I = {
  gauge:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>',
  cog:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82M4.6 9a1.65 1.65 0 0 0-.33-1.82"/>',
  brush:'<circle cx="13.5" cy="6.5" r="2.5"/><circle cx="6.5" cy="12" r="2.5"/><path d="M12 2a10 10 0 1 0 10 10c0-1.5-3-1-3-3s3-1.5 3-3"/>',
  menu:'<path d="M3 7h18M3 12h18M3 17h18"/>',
  toggle:'<path d="M20 7h-9M14 17H5M17 17a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM7 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>',
  plug:'<path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/>',
  tool:'<path d="M14.7 6.3a4 4 0 0 1-5 5L4 17v3h3l5.7-5.7a4 4 0 0 0 5-5Z"/>',
  hook:'<path d="M22 12A10 10 0 1 1 12 2"/><path d="M12 6v6l4 2"/>',
  users:'<circle cx="9" cy="7" r="4"/><path d="M2 21v-1a7 7 0 0 1 14 0v1"/>',
  tag:'<path d="M20.6 4.6a2 2 0 0 0-1.4-.6H14l-9 9 5.4 5.4 9-9V4.6Z"/><circle cx="16" cy="8" r="1"/>',
  userplus:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/>',
  shield:'<path d="M12 2 4 5v6c0 5 3.5 8 8 11 4.5-3 8-6 8-11V5Z"/>',
  lock:'<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
  grid:'<path d="M3 7h18M3 12h18M3 17h18"/>',
  spark:'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
  heart:'<path d="M20.8 5.6a5 5 0 0 0-7-.4L12 7l-1.8-1.8a5 5 0 1 0-7 7L12 21l8.8-8.8a5 5 0 0 0 0-7Z"/>',
  bell:'<path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/>',
  mail:'<rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/>',
  file:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/>',
  zap:'<path d="M13 2 3 14h9l-1 8 10-12h-9z"/>',
  phone:'<rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/>',
  send:'<path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/>',
  drip:'<path d="M12 2s6 7 6 11a6 6 0 0 1-12 0c0-4 6-11 6-11Z"/>',
  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/>',

// ===== SHARED pagination — one component for every large listing =====
function pageList(cur,pages){
  if(pages<=7) return Array.from({length:pages},(_,i)=>i+1);
  const keep=new Set([1,2,pages-1,pages,cur-1,cur,cur+1]);
  const arr=[...keep].filter(n=>n>=1&&n<=pages).sort((a,b)=>a-b);
  const out=[];let prev=0;
  for(const n of arr){ if(n-prev>1) out.push('…'); out.push(n); prev=n; }
  return out;
}
function renderPager(key,total,page,per){
  const pages=Math.max(1,Math.ceil(total/per));
  const start=total?((page-1)*per+1):0, end=Math.min(page*per,total);
  const pbtn=n=> n==='…'?`<span class="pgell">…</span>`
    :`<button class="pgbtn" data-key="${key}" data-page="${n}" ${n===page?'aria-current="page"':''}>${n}</button>`;
  return `<div class="pager" role="navigation" aria-label="Pagination">
    <span class="info">${start.toLocaleString()}–${end.toLocaleString()} of ${total.toLocaleString()}</span>
    <span class="per">Rows <select onchange="">${[10,20,50,100].map(x=>`<option ${x===per?'selected':''}>${x}</option>`).join('')}</select></span>
    <span class="sp"></span>
    <span class="pgnav">
      <button class="pgbtn" data-key="${key}" data-page="${page-1}" ${page<=1?'disabled':''} aria-label="Previous page">‹</button>
      ${pages>1?pageList(page,pages).map(pbtn).join(''):''}
      <button class="pgbtn" data-key="${key}" data-page="${page+1}" ${page>=pages?'disabled':''} aria-label="Next page">›</button>
    </span>
  </div>`;
}
function tableCardRaw(cols,rows){return `<table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map((c,i)=>{if(i===0&&c.includes('·')){const idx=c.indexOf('·'),ini=c.slice(0,idx),nm=c.slice(idx+1);return `<td><div class="u"><span class="av">${ini||'—'}</span>${nm}</div></td>`;}return `<td>${c}</td>`;}).join('')}</tr>`).join('')}</tbody></table>`;}

function route(key){
  let html;
  if(key==='overview')html=renderOverview();
  else if(['members','spaces','mod-queue','subscriptions','broadcasts','drip','scheduled'].includes(key))html=renderList(key);
  else if(key==='plans')html=renderEditor();
  else if(key==='wizard')html=renderWizard();
  else if(key==='insights')html=renderOverview();
  else html=renderSettings(key);
  screen.innerHTML=html; screen.scrollTop=0;
  crumb.textContent=title(key);
  document.querySelectorAll('.lnk').forEach(a=>a.classList.toggle('on',a.dataset.view===key));
}

// build nav
document.getElementById('nav').innerHTML =
 `<div class="nav-search" id="navSearch"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg> Search settings <kbd>⌘K</kbd></div>`
 + GROUPS.map(g=>`<div class="grp"><div class="grp-h">${g.h}${g.pro?'<span class="pro">PRO</span>':''}</div>${g.items.map(([k,l,i])=>`<div class="lnk" data-view="${k}">${ic(i)} ${l}</div>`).join('')}</div>`).join('');
document.querySelectorAll('.lnk').forEach(a=>a.addEventListener('click',()=>route(a.dataset.view)));

// shared pager: delegated paging for every list (no inline handlers)
document.addEventListener('click',e=>{
  const b=e.target.closest('.pgbtn[data-page]');
  if(!b||b.disabled)return;
  const k=b.dataset.key,n=+b.dataset.page;
  if(n>=1){screen.innerHTML=renderList(k,n);screen.scrollTop=0;}
});

// ===== command palette (search any setting) =====
const INDEX=[];
GROUPS.forEach(g=>g.items.forEach(([k,l,i])=>{INDEX.push({key:k,label:l,ctx:g.h,icon:i});
  const sd=S[k]; if(sd) sd.cards.forEach(c=>c.f.forEach(f=>INDEX.push({key:k,label:f.l,ctx:l,icon:c.i})));}));
const palBg=document.getElementById('palBg'),palInput=document.getElementById('palInput'),palList=document.getElementById('palList');
let sel=0,results=[];
function openPal(){palBg.classList.add('show');palInput.value='';filterPal('');palInput.focus();}
function closePal(){palBg.classList.remove('show');}
function filterPal(q){q=q.toLowerCase().trim();
  results=!q?INDEX.slice(0,8):INDEX.filter(x=>(x.label+' '+x.ctx).toLowerCase().includes(q)).slice(0,12);
  sel=0;
  palList.innerHTML=results.length?results.map((r,n)=>`<div class="pal-it ${n===0?'sel':''}" data-n="${n}"><span class="ti">${ic(r.icon)}</span><span class="lab">${r.label}</span><span class="ctx">${r.ctx}</span></div>`).join('')
    :`<div class="pal-empty">No settings match "${q}"</div>`;
  palList.querySelectorAll('.pal-it').forEach(el=>el.addEventListener('click',()=>{go(results[+el.dataset.n]);}));}
function go(r){if(!r)return;closePal();route(r.key);}
palInput.addEventListener('input',e=>filterPal(e.target.value));
document.getElementById('palBtn').addEventListener('click',openPal);
document.getElementById('navSearch').addEventListener('click',openPal);
palBg.addEventListener('click',e=>{if(e.target===palBg)closePal();});
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openPal();}
  if(!palBg.classList.contains('show'))return;
  if(e.key==='Escape')closePal();
  if(e.key==='ArrowDown'){e.preventDefault();sel=Math.min(sel+1,results.length-1);paintSel();}
  if(e.key==='ArrowUp'){e.preventDefault();sel=Math.max(sel-1,0);paintSel();}
  if(e.key==='Enter')go(results[sel]);
});
function paintSel(){palList.querySelectorAll('.pal-it').forEach((el,n)=>el.classList.toggle('sel',n===sel));}

// boot
route('overview');
</script>
</body>
</html>
