<!DOCTYPE html>
<html lang="en" data-bn-theme="light" data-bn-density="comfortable">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuddyNext — Notifications</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../chrome.css?v=3">
<style>
.nf-stack { display: flex; flex-direction: column; gap: var(--bn-s4); }

.nf-head {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: var(--bn-s4);
  flex-wrap: wrap;
}
.nf-head h1 {
  font-family: var(--bn-font-display);
  font-size: var(--bn-text-2xl);
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--bn-ink);
}
.nf-head h1 sup {
  font-family: var(--bn-font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--bn-accent);
  background: var(--bn-accent-100);
  padding: 2px 7px;
  border-radius: 999px;
  margin-left: 6px;
  vertical-align: middle;
  letter-spacing: 0.04em;
}
.nf-head-actions { display: flex; gap: var(--bn-s2); align-items: center; }

.nf-tabs {
  display: flex; align-items: center;
  gap: 2px;
  background: var(--bn-sunken);
  padding: 3px;
  border-radius: var(--bn-r-md);
  width: fit-content;
}
.nf-tab {
  padding: 6px 12px;
  font-size: 13px;
  font-weight: 500;
  color: var(--bn-ink-3);
  border-radius: 6px;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: all var(--bn-dur-fast) var(--bn-ease);
  white-space: nowrap;
}
.nf-tab:hover { color: var(--bn-ink); }
.nf-tab.active {
  background: var(--bn-canvas);
  color: var(--bn-ink);
  font-weight: 600;
  box-shadow: var(--bn-shadow-xs);
}
.nf-tab-count {
  font-family: var(--bn-font-mono);
  font-size: 10px;
  font-weight: 600;
  background: var(--bn-line);
  color: var(--bn-ink-3);
  padding: 1px 6px;
  border-radius: 6px;
}
.nf-tab.active .nf-tab-count { background: var(--bn-accent); color: var(--bn-accent-fg); }

.nf-section-head {
  display: flex; align-items: baseline; justify-content: space-between;
  font-family: var(--bn-font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--bn-ink-4);
  padding: var(--bn-s2) 2px;
}
.nf-section-head .nf-section-action {
  font-family: var(--bn-font-sans);
  font-size: 12px;
  text-transform: none;
  letter-spacing: 0;
  color: var(--bn-accent);
  font-weight: 500;
  cursor: pointer;
}

/* List card */
.nf-list {
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-lg);
  overflow: hidden;
}
.nf-row {
  display: flex; gap: var(--bn-s3);
  padding: var(--bn-s3) var(--bn-s4);
  border-bottom: 1px solid var(--bn-line-faint);
  cursor: pointer;
  transition: background var(--bn-dur-fast) var(--bn-ease);
  position: relative;
  align-items: flex-start;
}
.nf-row:last-child { border-bottom: none; }
.nf-row:hover { background: var(--bn-sunken); }
.nf-row.unread::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--bn-accent);
}

.nf-ava-wrap {
  position: relative;
  flex-shrink: 0;
}
.nf-ava {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  color: white;
  font-family: var(--bn-font-mono);
  font-weight: 600;
  font-size: 13px;
}
.nf-typeicon {
  position: absolute;
  bottom: -2px; right: -2px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--bn-canvas);
  border: 2px solid var(--bn-surface);
  display: inline-flex; align-items: center; justify-content: center;
}
.nf-typeicon svg { width: 10px; height: 10px; stroke-width: 2.2; fill: none; }
.nf-typeicon[data-type="like"] { background: oklch(94% 0.04 25); color: oklch(58% 0.20 25); }
.nf-typeicon[data-type="reply"] { background: var(--bn-accent-100); color: var(--bn-accent); }
.nf-typeicon[data-type="follow"] { background: oklch(94% 0.06 155); color: oklch(50% 0.16 155); }
.nf-typeicon[data-type="invite"] { background: oklch(94% 0.06 290); color: oklch(50% 0.20 290); }
.nf-typeicon[data-type="announce"] { background: oklch(94% 0.06 70); color: oklch(50% 0.16 70); }
.nf-typeicon[data-type="ai"] { background: var(--bn-accent-100); color: var(--bn-accent); }
.nf-typeicon[data-type="paid"] { background: oklch(92% 0.06 290); color: oklch(45% 0.22 290); }

.nf-body { flex: 1; min-width: 0; }
.nf-text {
  font-size: 14px;
  line-height: 1.45;
  color: var(--bn-ink);
}
.nf-text strong { font-weight: 600; }
.nf-text .nf-link { color: var(--bn-accent); }
.nf-text .nf-muted { color: var(--bn-ink-3); }

.nf-preview {
  margin-top: 6px;
  padding: 8px 12px;
  background: var(--bn-sunken);
  border-radius: var(--bn-r-sm);
  font-size: 13px;
  line-height: 1.45;
  color: var(--bn-ink-2);
  border-left: 2px solid var(--bn-line);
  font-family: var(--bn-font-sans);
}
.nf-preview-img {
  margin-top: 6px;
  display: flex; gap: 6px;
}
.nf-preview-img img,
.nf-preview-img-tile {
  width: 56px; height: 56px;
  border-radius: var(--bn-r-sm);
  background: linear-gradient(135deg, var(--bn-accent-100), var(--bn-sunken));
  flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--bn-font-display);
  font-weight: 700;
  color: var(--bn-accent);
}

.nf-meta-row {
  display: flex; align-items: center; gap: var(--bn-s2);
  margin-top: 4px;
  font-family: var(--bn-font-mono);
  font-size: 11px;
  color: var(--bn-ink-4);
  letter-spacing: 0.02em;
}
.nf-meta-row .dot { width: 3px; height: 3px; background: currentColor; border-radius: 50%; opacity: 0.5; }

.nf-row-actions {
  display: flex; gap: 6px;
  margin-top: var(--bn-s2);
}
.nf-action-btn {
  padding: 5px 12px;
  background: transparent;
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-sm);
  font: inherit;
  font-size: 12px;
  font-weight: 500;
  color: var(--bn-ink-2);
  cursor: pointer;
  transition: all var(--bn-dur-fast) var(--bn-ease);
}
.nf-action-btn:hover { border-color: var(--bn-ink-3); color: var(--bn-ink); }
.nf-action-btn.primary {
  background: var(--bn-ink);
  color: var(--bn-canvas);
  border-color: var(--bn-ink);
}
.nf-action-btn.primary:hover { transform: translateY(-1px); }

.nf-time {
  flex-shrink: 0;
  font-family: var(--bn-font-mono);
  font-size: 11px;
  color: var(--bn-ink-4);
  letter-spacing: 0.02em;
}

.nf-mute {
  width: 24px; height: 24px;
  border-radius: var(--bn-r-sm);
  display: none;
  align-items: center; justify-content: center;
  color: var(--bn-ink-3);
  flex-shrink: 0;
  cursor: pointer;
}
.nf-mute svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 1.75; fill: none; }
.nf-row:hover .nf-mute { display: inline-flex; }
.nf-mute:hover { background: var(--bn-line); color: var(--bn-ink); }

/* Empty / digest cards */
.nf-empty {
  background: var(--bn-surface);
  border: 1px dashed var(--bn-line);
  border-radius: var(--bn-r-lg);
  padding: var(--bn-s5) var(--bn-s5);
  text-align: center;
  display: flex; flex-direction: column; align-items: center;
  gap: 4px;
}
.nf-empty-emblem {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--bn-sunken);
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--bn-ink-3);
  margin-bottom: 6px;
}
.nf-empty-emblem svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; }
.nf-empty-title { font-family: var(--bn-font-display); font-weight: 600; font-size: 16px; color: var(--bn-ink); }
.nf-empty-sub { font-size: 13px; color: var(--bn-ink-3); max-width: 360px; line-height: 1.5; }

/* Aside */
.nf-aside-card {
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-lg);
  padding: var(--bn-s4);
}
.nf-aside-card + .nf-aside-card { margin-top: var(--bn-s3); }
.nf-aside-h {
  font-family: var(--bn-font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--bn-ink-4);
  margin-bottom: var(--bn-s3);
}

/* Mute list */
.nf-mute-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0;
  font-size: 13px;
  border-bottom: 1px solid var(--bn-line-faint);
}
.nf-mute-row:last-child { border: none; }
.nf-mute-row-label { color: var(--bn-ink-2); }
.nf-mute-row-status { font-family: var(--bn-font-mono); font-size: 11px; color: var(--bn-ink-3); }

/* Stats */
.nf-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--bn-s3);
}
.nf-stat-num {
  font-family: var(--bn-font-display);
  font-size: var(--bn-text-xl);
  font-weight: 700;
  color: var(--bn-ink);
  display: flex; align-items: baseline; gap: 6px;
}
.nf-stat-delta {
  font-family: var(--bn-font-mono);
  font-size: 11px;
  font-weight: 500;
  color: oklch(50% 0.16 155);
}
.nf-stat-lbl {
  font-family: var(--bn-font-mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--bn-ink-4);
  margin-top: 1px;
}

.nf-quick {
  display: flex; align-items: center; gap: var(--bn-s2);
  padding: 8px 10px;
  background: var(--bn-sunken);
  border-radius: var(--bn-r-sm);
  margin-bottom: 6px;
  font-size: 12.5px;
  cursor: pointer;
  transition: background var(--bn-dur-fast) var(--bn-ease);
}
.nf-quick:hover { background: var(--bn-line); }
.nf-quick svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 1.75; fill: none; flex-shrink: 0; color: var(--bn-ink-3); }
.nf-quick-label { flex: 1; color: var(--bn-ink-2); }
.nf-quick-meta { font-family: var(--bn-font-mono); font-size: 10px; color: var(--bn-ink-4); }
</style>
</head>

<div class="bn-app" id="app"></div>
