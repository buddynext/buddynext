<!DOCTYPE html>
<html lang="en" data-bn-theme="light" data-bn-density="comfortable">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuddyNext — Messages</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../chrome.css?v=3">
<style>
/* ─── DM list page: shell ─── */
.bn-page[data-layout="dm"] {
  grid-template-columns: minmax(0, 1fr) !important;
  max-width: none !important;
  padding: 0 !important;
  height: calc(100vh - var(--bn-topbar-h) - var(--bn-topbar-h));
  min-height: 600px;
}

.dml-shell {
  display: grid;
  grid-template-columns: 380px minmax(0, 1fr);
  height: 100%;
  background: var(--bn-bg);
  border-top: 1px solid var(--bn-line);
}
@media (max-width: 900px) {
  .dml-shell { grid-template-columns: minmax(0, 1fr); }
  .dml-empty { display: none; }
}

/* ─── List pane ─── */
.dml-list {
  background: var(--bn-surface);
  border-right: 1px solid var(--bn-line);
  display: flex; flex-direction: column;
  min-height: 0;
}

/* Head */
.dml-head {
  padding: var(--bn-s5) var(--bn-s5) var(--bn-s4);
  border-bottom: 1px solid var(--bn-line);
  display: flex; flex-direction: column; gap: var(--bn-s3);
}
.dml-head-row {
  display: flex; align-items: baseline; justify-content: space-between;
}
.dml-h1 {
  font-family: var(--bn-font-display);
  font-size: var(--bn-text-xl);
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--bn-ink);
}
.dml-h1 sup {
  font-family: var(--bn-font-mono);
  font-size: 11px;
  font-weight: 600;
  background: var(--bn-accent-100);
  color: var(--bn-accent);
  padding: 2px 7px;
  border-radius: 999px;
  letter-spacing: 0.04em;
  margin-left: 6px;
  vertical-align: middle;
}
.dml-new {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--bn-ink);
  color: var(--bn-canvas);
  border: 1px solid var(--bn-ink);
  padding: 6px 12px;
  border-radius: var(--bn-r-sm);
  font-size: 12px; font-weight: 600;
  cursor: pointer;
  transition: transform var(--bn-dur-fast) var(--bn-ease);
}
.dml-new:hover { transform: translateY(-1px); }
.dml-new svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 2; fill: none; }

.dml-search {
  position: relative;
  display: flex; align-items: center;
  background: var(--bn-sunken);
  border: 1px solid transparent;
  border-radius: var(--bn-r-md);
  padding: 0 var(--bn-s3);
  height: 36px;
  transition: all var(--bn-dur-fast) var(--bn-ease);
}
.dml-search:focus-within {
  background: var(--bn-canvas);
  border-color: var(--bn-line);
  box-shadow: 0 0 0 3px var(--bn-accent-100);
}
.dml-search svg { width: 14px; height: 14px; stroke: var(--bn-ink-3); stroke-width: 2; fill: none; }
.dml-search input {
  flex: 1;
  border: none; background: transparent;
  font: inherit; font-size: 13px;
  padding: 0 var(--bn-s2);
  outline: none;
  color: var(--bn-ink);
}
.dml-search-kbd {
  font-family: var(--bn-font-mono);
  font-size: 10px;
  background: var(--bn-canvas);
  border: 1px solid var(--bn-line);
  padding: 2px 6px;
  border-radius: 3px;
  color: var(--bn-ink-4);
}

/* Tabs */
.dml-tabs {
  display: flex;
  padding: 0 var(--bn-s5);
  border-bottom: 1px solid var(--bn-line);
  gap: var(--bn-s5);
}
.dml-tab {
  padding: var(--bn-s3) 0;
  font-size: 13px;
  font-weight: 500;
  color: var(--bn-ink-3);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
  transition: color var(--bn-dur-fast) var(--bn-ease), border-color var(--bn-dur-fast) var(--bn-ease);
}
.dml-tab:hover { color: var(--bn-ink); }
.dml-tab.active {
  color: var(--bn-ink);
  border-bottom-color: var(--bn-accent);
  font-weight: 600;
}
.dml-tab-count {
  font-family: var(--bn-font-mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--bn-ink-4);
}
.dml-tab.active .dml-tab-count { color: var(--bn-accent); }
.dml-tab-pill {
  background: oklch(58% 0.20 25);
  color: white;
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 6px;
  font-family: var(--bn-font-mono);
  font-weight: 700;
}

/* Section label */
.dml-section-label {
  font-family: var(--bn-font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--bn-ink-4);
  padding: var(--bn-s3) var(--bn-s5) var(--bn-s2);
  display: flex; align-items: center; gap: 6px;
}
.dml-section-label svg { width: 11px; height: 11px; stroke: currentColor; stroke-width: 1.75; fill: none; }

/* List body */
.dml-body { flex: 1; overflow-y: auto; min-height: 0; }
.dml-body::-webkit-scrollbar { width: 6px; }
.dml-body::-webkit-scrollbar-thumb { background: var(--bn-line); border-radius: 3px; }

.dml-row {
  display: flex; gap: var(--bn-s3);
  padding: var(--bn-s3) var(--bn-s5);
  cursor: pointer;
  position: relative;
  align-items: center;
  border-left: 2px solid transparent;
  transition: background var(--bn-dur-fast) var(--bn-ease);
}
.dml-row:hover { background: var(--bn-sunken); }
.dml-row.unread { background: color-mix(in oklch, var(--bn-accent) 4%, transparent); }
.dml-row.unread::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--bn-accent);
}

.dml-ava-wrap { position: relative; flex-shrink: 0; }
.dml-ava {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  color: white;
  font-family: var(--bn-font-mono);
  font-weight: 600;
  font-size: 13px;
}
.dml-ava-pair {
  position: relative;
  width: 44px; height: 44px;
}
.dml-ava-pair .dml-ava {
  width: 28px; height: 28px;
  font-size: 10px;
  position: absolute;
  border: 2px solid var(--bn-surface);
}
.dml-ava-pair .dml-ava:nth-child(1) { top: 0; left: 0; }
.dml-ava-pair .dml-ava:nth-child(2) { bottom: 0; right: 0; }
.dml-online {
  position: absolute;
  bottom: 0; right: 0;
  width: 11px; height: 11px;
  background: oklch(60% 0.20 145);
  border: 2px solid var(--bn-surface);
  border-radius: 50%;
}

.dml-info { flex: 1; min-width: 0; }
.dml-name-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 2px;
  gap: var(--bn-s2);
}
.dml-name {
  font-size: 13.5px;
  font-weight: 500;
  color: var(--bn-ink-2);
  display: flex; align-items: center; gap: 5px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
}
.dml-row.unread .dml-name { font-weight: 600; color: var(--bn-ink); }
.dml-name .verified {
  width: 12px; height: 12px;
  background: var(--bn-accent);
  color: white;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 700;
  flex-shrink: 0;
}
.dml-name-tag {
  font-family: var(--bn-font-mono);
  font-size: 9px;
  font-weight: 600;
  color: var(--bn-ink-4);
  background: var(--bn-sunken);
  padding: 1px 5px;
  border-radius: 3px;
  letter-spacing: 0.04em;
  flex-shrink: 0;
}
.dml-time {
  font-family: var(--bn-font-mono);
  font-size: 11px;
  color: var(--bn-ink-4);
  letter-spacing: 0.02em;
  flex-shrink: 0;
}
.dml-row.unread .dml-time { color: var(--bn-accent); font-weight: 600; }

.dml-preview-row {
  display: flex; align-items: center; gap: var(--bn-s2);
  justify-content: space-between;
}
.dml-preview {
  font-size: 12.5px;
  color: var(--bn-ink-3);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  min-width: 0;
}
.dml-row.unread .dml-preview { color: var(--bn-ink-2); font-weight: 500; }
.dml-preview.typing {
  color: var(--bn-accent);
  font-style: italic;
  display: inline-flex; align-items: center; gap: 4px;
}
.dml-preview.typing::before {
  content: '';
  width: 4px; height: 4px;
  border-radius: 50%;
  background: currentColor;
  animation: dml-blink 1.2s infinite;
}
@keyframes dml-blink { 0%, 50%, 100% { opacity: 0.3; } 25% { opacity: 1; } }
.dml-preview .dml-preview-from {
  color: var(--bn-ink-4);
  font-weight: 500;
}
.dml-preview .dml-att-icon {
  display: inline-flex;
  vertical-align: middle;
  margin-right: 4px;
  color: var(--bn-ink-4);
}
.dml-preview .dml-att-icon svg { width: 11px; height: 11px; stroke: currentColor; stroke-width: 2; fill: none; }

.dml-meta { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.dml-badge {
  background: var(--bn-accent);
  color: var(--bn-accent-fg);
  font-family: var(--bn-font-mono);
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 8px;
  min-width: 18px;
  text-align: center;
  letter-spacing: 0.02em;
}
.dml-mini-icon {
  width: 12px; height: 12px;
  color: var(--bn-ink-4);
}
.dml-mini-icon svg { width: 100%; height: 100%; stroke: currentColor; stroke-width: 1.75; fill: none; }

/* Pinned ribbon */
.dml-pinned-mark {
  position: absolute;
  top: 4px; right: 6px;
  color: var(--bn-ink-4);
  width: 11px; height: 11px;
}
.dml-pinned-mark svg { width: 100%; height: 100%; stroke: currentColor; fill: currentColor; }

/* Ghost row (hover quick actions) */
.dml-row-actions {
  position: absolute;
  right: var(--bn-s3); top: 50%;
  transform: translateY(-50%);
  display: none;
  gap: 4px;
  background: var(--bn-surface);
  padding: 4px;
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-sm);
  box-shadow: var(--bn-shadow-sm);
}
.dml-row:hover .dml-row-actions { display: flex; }
.dml-row-actions button {
  width: 24px; height: 24px;
  border: none; background: transparent;
  border-radius: var(--bn-r-xs);
  color: var(--bn-ink-3);
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
}
.dml-row-actions button:hover { background: var(--bn-sunken); color: var(--bn-ink); }
.dml-row-actions svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 1.75; fill: none; }

/* Footer of list */
.dml-foot {
  border-top: 1px solid var(--bn-line);
  padding: var(--bn-s3) var(--bn-s5);
  font-family: var(--bn-font-mono);
  font-size: 11px;
  color: var(--bn-ink-4);
  display: flex; align-items: center; justify-content: space-between;
}

/* ─── Empty / hero pane ─── */
.dml-empty {
  background: var(--bn-canvas);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: var(--bn-s7);
  position: relative;
  overflow: auto;
}
.dml-empty-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 30%, var(--bn-accent-100), transparent 45%),
    radial-gradient(circle at 80% 75%, color-mix(in oklch, oklch(60% 0.20 290) 18%, transparent), transparent 40%);
  opacity: 0.7;
  pointer-events: none;
}
.dml-empty-bg::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(45deg, transparent 0 32px, color-mix(in oklch, var(--bn-ink) 4%, transparent) 32px 33px);
  opacity: 0.5;
  mix-blend-mode: multiply;
}

.dml-empty-card {
  position: relative; z-index: 1;
  max-width: 540px;
  width: 100%;
}
.dml-empty-emblem {
  width: 64px; height: 64px;
  border-radius: var(--bn-r-lg);
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--bn-accent);
  margin-bottom: var(--bn-s4);
  box-shadow: var(--bn-shadow-md);
}
.dml-empty-emblem svg { width: 28px; height: 28px; stroke: currentColor; stroke-width: 1.75; fill: none; }

.dml-empty-eyebrow {
  font-family: var(--bn-font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--bn-accent);
  margin-bottom: var(--bn-s2);
}
.dml-empty-title {
  font-family: var(--bn-font-display);
  font-size: clamp(28px, 3vw, 36px);
  font-weight: 700;
  letter-spacing: -0.025em;
  color: var(--bn-ink);
  line-height: 1.1;
  margin-bottom: var(--bn-s3);
}
.dml-empty-lead {
  font-size: 15px;
  line-height: 1.55;
  color: var(--bn-ink-2);
  margin-bottom: var(--bn-s5);
  max-width: 440px;
}

.dml-empty-actions {
  display: flex; gap: var(--bn-s2);
  margin-bottom: var(--bn-s7);
}

/* Suggestion strip */
.dml-suggest-h {
  font-family: var(--bn-font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--bn-ink-4);
  margin-bottom: var(--bn-s3);
}
.dml-suggest-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--bn-s3);
}
@media (max-width: 1100px) {
  .dml-suggest-grid { grid-template-columns: 1fr; }
}
.dml-suggest {
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-md);
  padding: var(--bn-s3);
  display: flex; gap: var(--bn-s3);
  align-items: center;
  cursor: pointer;
  transition: all var(--bn-dur-fast) var(--bn-ease);
}
.dml-suggest:hover {
  border-color: var(--bn-accent);
  transform: translateY(-1px);
  box-shadow: var(--bn-shadow-sm);
}
.dml-suggest-info { flex: 1; min-width: 0; }
.dml-suggest-name {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--bn-ink);
}
.dml-suggest-reason {
  font-family: var(--bn-font-mono);
  font-size: 10px;
  letter-spacing: 0.02em;
  color: var(--bn-ink-4);
  margin-top: 2px;
}
.dml-suggest-go {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--bn-sunken);
  color: var(--bn-ink-3);
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.dml-suggest:hover .dml-suggest-go { background: var(--bn-accent); color: var(--bn-accent-fg); }
.dml-suggest-go svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 2; fill: none; }

/* Tip footer */
.dml-tips {
  position: relative; z-index: 1;
  display: flex; gap: var(--bn-s5);
  margin-top: var(--bn-s7);
  font-family: var(--bn-font-mono);
  font-size: 11px;
  color: var(--bn-ink-3);
  letter-spacing: 0.02em;
}
.dml-tip { display: flex; align-items: center; gap: 6px; }
.dml-tip kbd {
  font-family: inherit;
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 10px;
}

/* AI banner */
.dml-ai {
  background: linear-gradient(135deg, var(--bn-accent-100), var(--bn-surface));
  border: 1px solid var(--bn-accent);
  border-radius: var(--bn-r-md);
  padding: var(--bn-s3) var(--bn-s4);
  display: flex; gap: var(--bn-s3);
  align-items: center;
  margin-bottom: var(--bn-s4);
}
.dml-ai-icon {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--bn-accent);
  color: var(--bn-accent-fg);
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 16px;
}
.dml-ai-text {
  flex: 1;
  font-size: 13px;
  line-height: 1.45;
  color: var(--bn-ink-2);
}
.dml-ai-text b { color: var(--bn-ink); }

/* Avatar gradient bg classes */
.av-emerald { background: linear-gradient(135deg, oklch(65% 0.16 155), oklch(55% 0.16 165)); }
.av-violet  { background: linear-gradient(135deg, oklch(60% 0.20 290), oklch(50% 0.22 295)); }
.av-amber   { background: linear-gradient(135deg, oklch(70% 0.16 60),  oklch(60% 0.18 50)); }
.av-rose    { background: linear-gradient(135deg, oklch(68% 0.18 350), oklch(58% 0.20 345)); }
.av-teal    { background: linear-gradient(135deg, oklch(65% 0.14 195), oklch(55% 0.16 200)); }
.av-indigo  { background: linear-gradient(135deg, oklch(60% 0.18 270), oklch(50% 0.20 280)); }
</style>
</head>
<body>

<div class="bn-app" id="app"></div>

<script src="../chrome.js"></script>
<script>
const body = `

        <div class="dml-info">
