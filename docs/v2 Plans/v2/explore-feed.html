<style>
/* ─── Explore-specific ─── */
.explore-stack { display: flex; flex-direction: column; gap: var(--bn-s5); }

/* Hero search */
.explore-hero {
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-lg);
  padding: var(--bn-s6);
  position: relative; overflow: hidden;
}
.explore-hero::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(60% 100% at 100% 0%, var(--bn-accent-100), transparent 70%),
    radial-gradient(40% 80% at 0% 100%, var(--bn-jetonomy-100, var(--bn-accent-100)), transparent 70%);
  opacity: 0.5; pointer-events: none;
}
.explore-hero > * { position: relative; }
.hero-eyebrow {
  font-family: var(--bn-font-mono);
  font-size: var(--bn-text-xs);
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--bn-ink-3); margin-bottom: var(--bn-s2);
}
.hero-title {
  font-family: var(--bn-font-display);
  font-size: 32px; font-weight: 700;
  color: var(--bn-ink); letter-spacing: -0.02em;
  line-height: 1.1; margin-bottom: var(--bn-s4);
}
.hero-search {
  display: flex; align-items: center; gap: var(--bn-s3);
  background: var(--bn-bg); border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-md);
  padding: 12px var(--bn-s4);
  font-size: var(--bn-text-base);
  color: var(--bn-ink-3);
  margin-bottom: var(--bn-s3);
  max-width: 540px;
}
.hero-search:focus-within { border-color: var(--bn-accent); }
.hero-search svg { width: 18px; height: 18px; flex-shrink: 0; }
.hero-search input {
  flex: 1; border: none; background: transparent;
  font-family: var(--bn-font-ui);
  font-size: var(--bn-text-base); color: var(--bn-ink);
}
.hero-search input:focus { outline: none; }
.hero-search input::placeholder { color: var(--bn-ink-3); }
.hero-kbd {
  font-family: var(--bn-font-mono);
  font-size: var(--bn-text-xs);
  padding: 2px 6px; border-radius: 4px;
  background: var(--bn-sunken); color: var(--bn-ink-3);
  border: 1px solid var(--bn-line-faint);
}
.hero-quick {
  display: flex; gap: var(--bn-s2); flex-wrap: wrap;
  font-size: var(--bn-text-sm); color: var(--bn-ink-3);
}
.hero-quick .label { padding-top: 2px; }
.quick-chip {
  font-size: var(--bn-text-xs); font-weight: 500;
  padding: 3px 10px; border-radius: var(--bn-r-full);
  background: var(--bn-surface); border: 1px solid var(--bn-line);
  color: var(--bn-ink-2); cursor: pointer;
}
.quick-chip:hover { background: var(--bn-sunken); color: var(--bn-ink); }

/* Filter row */
.filter-row {
  display: flex; gap: var(--bn-s2); align-items: center;
  flex-wrap: wrap;
}
.filter-chip {
  font-size: var(--bn-text-sm); font-weight: 500;
  padding: 6px 12px; border-radius: var(--bn-r-full);
  background: var(--bn-surface); border: 1px solid var(--bn-line);
  color: var(--bn-ink-2); cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  transition: all var(--bn-dur-fast) var(--bn-ease);
}
.filter-chip:hover { background: var(--bn-sunken); color: var(--bn-ink); }
.filter-chip[aria-pressed="true"] {
  background: var(--bn-ink); color: var(--bn-bg); border-color: var(--bn-ink);
}
.filter-chip svg { width: 14px; height: 14px; }
.filter-divider { width: 1px; height: 20px; background: var(--bn-line); }

/* Masonry grid */
.explore-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: var(--bn-s4);
  align-items: start;
}
.ec-card {
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-lg);
  overflow: hidden;
  transition: transform var(--bn-dur-fast) var(--bn-ease), border-color var(--bn-dur-fast) var(--bn-ease);
  cursor: pointer;
  display: flex; flex-direction: column;
}
.ec-card:hover { border-color: var(--bn-ink-4); transform: translateY(-1px); }
.ec-card.span-2 { grid-column: span 2; }
.ec-card.span-tall { grid-row: span 2; }

.ec-img {
  width: 100%; aspect-ratio: 16/10;
  background: linear-gradient(135deg, var(--bn-sunken), var(--bn-line));
  display: flex; align-items: center; justify-content: center;
  color: var(--bn-ink-3); font-family: var(--bn-font-mono);
  font-size: var(--bn-text-xs);
  position: relative; overflow: hidden;
}
.ec-img.tall { aspect-ratio: 4/5; }
.ec-img[data-tone="violet"] { background: linear-gradient(135deg, #ddd6fe, #a78bfa); }
.ec-img[data-tone="amber"] { background: linear-gradient(135deg, #fde68a, #f59e0b); }
.ec-img[data-tone="emerald"] { background: linear-gradient(135deg, #a7f3d0, #10b981); }
.ec-img[data-tone="rose"] { background: linear-gradient(135deg, #fecdd3, #f43f5e); }
.ec-img[data-tone="sky"] { background: linear-gradient(135deg, #bae6fd, #0ea5e9); }
.ec-img-overlay {
  position: absolute; bottom: var(--bn-s3); left: var(--bn-s3);
  background: rgba(0,0,0,0.6); color: #fff;
  font-size: var(--bn-text-xs);
  padding: 3px 8px; border-radius: var(--bn-r-sm);
  display: inline-flex; align-items: center; gap: 4px;
  backdrop-filter: blur(4px);
}

.ec-body { padding: var(--bn-s4); flex: 1; display: flex; flex-direction: column; gap: var(--bn-s2); }
.ec-kicker {
  font-family: var(--bn-font-mono);
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--bn-ink-3);
}
.ec-title {
  font-size: var(--bn-text-base); font-weight: 600;
  color: var(--bn-ink); line-height: 1.3;
}
.ec-text {
  font-size: var(--bn-text-sm);
  color: var(--bn-ink-2); line-height: 1.5;
}
.ec-foot {
  display: flex; align-items: center; gap: var(--bn-s2);
  margin-top: auto;
  padding-top: var(--bn-s3);
  border-top: 1px solid var(--bn-line-faint);
  font-size: var(--bn-text-xs); color: var(--bn-ink-3);
}
.ec-foot .name { color: var(--bn-ink-2); font-weight: 500; }
.ec-foot .stats { margin-left: auto; display: inline-flex; gap: var(--bn-s3); }
.ec-foot .stats span { display: inline-flex; align-items: center; gap: 3px; }

/* Quote card */
.ec-card.is-quote { background: var(--bn-ink); color: var(--bn-bg); }
.ec-card.is-quote .ec-quote {
  font-family: var(--bn-font-display);
  font-size: 22px; font-weight: 500; line-height: 1.3;
  padding: var(--bn-s5); flex: 1;
  display: flex; align-items: center;
}
.ec-card.is-quote .ec-foot { border-color: rgba(255,255,255,0.1); padding: var(--bn-s4); border-top-width: 1px; }
.ec-card.is-quote .ec-foot .name { color: rgba(255,255,255,0.85); }
.ec-card.is-quote .ec-foot .stats { color: rgba(255,255,255,0.6); }

/* Forum card */
.ec-card.is-forum { background: var(--bn-jetonomy-bg, #f5f3ff); border-color: var(--bn-jetonomy-200, #ddd6fe); }
[data-bn-theme="dark"] .ec-card.is-forum { background: rgba(167,139,250,0.08); border-color: rgba(167,139,250,0.2); }

/* AI card */
.ec-card.is-ai {
  background: linear-gradient(135deg, var(--bn-accent-50), var(--bn-surface));
  border-color: var(--bn-accent-200, var(--bn-accent-100));
}
.ec-card.is-ai .ec-kicker { color: var(--bn-accent); }

/* Code card */
.ec-card.is-code .ec-code {
  background: var(--bn-ink); color: #e5e7eb;
  font-family: var(--bn-font-mono);
  font-size: 11px; line-height: 1.6;
  padding: var(--bn-s4);
  white-space: pre; overflow: hidden;
}
.ec-card.is-code .ec-code .key { color: #93c5fd; }
.ec-card.is-code .ec-code .str { color: #86efac; }
.ec-card.is-code .ec-code .com { color: #6b7280; font-style: italic; }

/* Aside */
.aside-card {
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-lg);
  padding: var(--bn-s4);
  display: flex; flex-direction: column; gap: var(--bn-s3);
}
.aside-title {
  font-family: var(--bn-font-display);
  font-size: var(--bn-text-xs); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--bn-ink-3);
  display: flex; align-items: center;
}
.aside-title a {
  margin-left: auto;
  font-size: var(--bn-text-xs); font-weight: 600;
  color: var(--bn-accent);
  text-transform: none; letter-spacing: 0;
}
.trend-row {
  display: flex; align-items: center; gap: var(--bn-s3);
  padding: 6px 0;
  border-bottom: 1px solid var(--bn-line-faint);
}
.trend-row:last-child { border-bottom: none; }
.trend-rank {
  font-family: var(--bn-font-display);
  font-size: var(--bn-text-base); font-weight: 800;
  color: var(--bn-ink-4); width: 18px; text-align: center;
}
.trend-info { flex: 1; min-width: 0; }
.trend-tag { font-size: var(--bn-text-sm); font-weight: 600; color: var(--bn-ink); }
.trend-stat { font-size: var(--bn-text-xs); color: var(--bn-ink-3); margin-top: 1px; }
.trend-spark {
  font-family: var(--bn-font-mono);
  font-size: 10px;
  color: var(--bn-jetonomy, #7c3aed);
}
.trend-spark.up { color: var(--bn-success, #059669); }
.trend-spark.down { color: var(--bn-danger, #dc2626); }

.suggested-row {
  display: flex; align-items: center; gap: var(--bn-s2);
  padding: 6px 0;

.suggested-info { flex: 1; min-width: 0; }
.suggested-name {
  font-size: var(--bn-text-sm); font-weight: 600;
  color: var(--bn-ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.suggested-meta {
  font-size: var(--bn-text-xs); color: var(--bn-ink-3);

}

.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--bn-s2); }
.cat-pill {
  background: var(--bn-sunken); border: 1px solid var(--bn-line-faint);

  padding: var(--bn-s2) var(--bn-s3);

}
.cat-pill:hover { background: var(--bn-bg); border-color: var(--bn-line); }
.cat-pill .name { font-weight: 600; color: var(--bn-ink); }
.cat-pill .count { color: var(--bn-ink-3); font-family: var(--bn-font-mono); font-size: 10px; }

</style>
</head>
