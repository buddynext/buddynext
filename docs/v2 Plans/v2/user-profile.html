<!DOCTYPE html>
<html lang="en" data-bn-theme="light" data-bn-density="comfortable">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuddyNext — Sarah Rodriguez</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../chrome.css?v=3">
<style>
/* ─── Profile-specific ─── */

/* Hero card */
.pf-hero {
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-lg);
  overflow: hidden;
  position: relative;
}
.pf-cover {
  height: 200px;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(circle at 20% 30%, color-mix(in oklch, oklch(60% 0.20 290) 50%, transparent), transparent 55%),
    radial-gradient(circle at 78% 70%, color-mix(in oklch, oklch(70% 0.18 350) 45%, transparent), transparent 50%),
    linear-gradient(135deg, var(--bn-accent-100), color-mix(in oklch, var(--bn-accent) 12%, var(--bn-sunken)));
}
.pf-cover::after {
  content:'';
  position:absolute; inset:0;
  background: repeating-linear-gradient(-30deg, transparent 0 26px, color-mix(in oklch, var(--bn-ink) 4%, transparent) 26px 27px);
  mix-blend-mode: multiply;
  opacity: 0.55;
}
.pf-cover-tag {
  position: absolute;
  top: var(--bn-s4); right: var(--bn-s4);
  font-family: var(--bn-font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--bn-ink-3);
  background: var(--bn-surface);
  padding: 4px 8px;
  border-radius: var(--bn-r-sm);
  border: 1px solid var(--bn-line);
}

.pf-head {
  padding: 0 var(--bn-s6) var(--bn-s5);
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: start;
  gap: var(--bn-s5);
}
@media (max-width: 720px) {
  .pf-head { grid-template-columns: 1fr; }
  .pf-actions { justify-self: start; }
}
.pf-avatar-wrap {
  position: relative;
  margin-top: -52px;
}
.pf-avatar {
  width: 112px; height: 112px;
  border-radius: 50%;
  border: 4px solid var(--bn-surface);
  box-shadow: var(--bn-shadow-md);
  background: linear-gradient(135deg, oklch(65% 0.16 155), oklch(55% 0.16 165));
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--bn-font-display);
  font-size: 40px;
  font-weight: 700;
}
.pf-avatar-status {
  position: absolute;
  bottom: 8px; right: 8px;
  width: 18px; height: 18px;
  background: oklch(65% 0.18 145);
  border-radius: 50%;
  border: 3px solid var(--bn-surface);
  box-shadow: 0 0 0 4px color-mix(in oklch, oklch(65% 0.18 145) 22%, transparent);
}

.pf-id { padding-top: var(--bn-s4); min-width: 0; }
.pf-name-row {
  display: flex; align-items: center; gap: var(--bn-s2);
  margin-bottom: 4px;
  flex-wrap: wrap;
}
.pf-name {
  font-family: var(--bn-font-display);
  font-size: var(--bn-text-3xl);
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--bn-ink);
}
.pf-degree {
  display: inline-flex; align-items: center;
  font-family: var(--bn-font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.04em;
  background: var(--bn-accent-100);
  color: var(--bn-accent);
  padding: 3px 8px;
  border-radius: 4px;
}
.pf-pronouns {
  font-family: var(--bn-font-mono);
  font-size: 11px;
  color: var(--bn-ink-3);
  font-weight: 400;
}
.pf-handle {
  font-family: var(--bn-font-mono);
  font-size: 12px;
  color: var(--bn-ink-3);
  margin-bottom: var(--bn-s3);
}
.pf-tagline {
  font-size: 14px;
  color: var(--bn-ink-2);
  line-height: 1.55;
  max-width: 540px;
  margin-bottom: var(--bn-s3);
}
.pf-meta {
  display: flex; flex-wrap: wrap; gap: var(--bn-s4);
  font-size: 12px;
  color: var(--bn-ink-3);
}
.pf-meta-item {
  display: inline-flex; align-items: center; gap: 6px;
}
.pf-meta-item svg {
  width: 13px; height: 13px;
  stroke: currentColor; stroke-width: 1.75; fill: none;
}
.pf-meta-item a { color: var(--bn-accent); text-decoration: none; }
.pf-meta-item a:hover { text-decoration: underline; }

.pf-actions {
  display: flex; gap: var(--bn-s2);
  padding-top: var(--bn-s4);
}
.pf-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  border-radius: var(--bn-r-md);
  font: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all var(--bn-dur-fast) var(--bn-ease);
}
.pf-btn-primary {
  background: var(--bn-ink);
  color: var(--bn-canvas);
}
.pf-btn-primary:hover { opacity: 0.9; }
.pf-btn-secondary {
  background: var(--bn-surface);
  border-color: var(--bn-line);
  color: var(--bn-ink);
}
.pf-btn-secondary:hover { border-color: var(--bn-accent); color: var(--bn-accent); }
.pf-btn-icon {
  width: 36px; height: 36px;
  padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  color: var(--bn-ink-2);
  border-radius: var(--bn-r-md);
  cursor: pointer;
  transition: all var(--bn-dur-fast) var(--bn-ease);
}
.pf-btn-icon:hover { background: var(--bn-sunken); color: var(--bn-ink); }
.pf-btn-icon svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.75; fill: none; }

/* Stats strip below hero */
.pf-stats {
  border-top: 1px solid var(--bn-line);
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  background: var(--bn-bg);
}
@media (max-width: 720px) { .pf-stats { grid-template-columns: repeat(2, 1fr); } }
.pf-stat {
  padding: var(--bn-s4);
  text-align: left;
  border-right: 1px solid var(--bn-line);
  cursor: pointer;
  transition: background var(--bn-dur-fast) var(--bn-ease);
}
.pf-stat:last-child { border-right: none; }
.pf-stat:hover { background: var(--bn-surface); }
.pf-stat-num {
  font-family: var(--bn-font-display);
  font-size: var(--bn-text-xl);
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--bn-ink);
}
.pf-stat-num small {
  font-family: var(--bn-font-mono);
  font-size: 11px;
  font-weight: 500;
  color: oklch(65% 0.18 145);
  margin-left: 6px;
  letter-spacing: 0;
}
.pf-stat-num small.flat { color: var(--bn-ink-4); }
.pf-stat-lbl {
  font-family: var(--bn-font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--bn-ink-4);
  margin-top: 2px;
}

/* ─── Content row tabs ─── */
.pf-tabs {
  display: flex;
  gap: var(--bn-s1);
  border-bottom: 1px solid var(--bn-line);
  padding: 0 var(--bn-s1);
  margin-bottom: var(--bn-s4);
}
.pf-tab {
  padding: var(--bn-s3) var(--bn-s4);
  font-size: 13px;
  font-weight: 500;
  color: var(--bn-ink-3);
  cursor: pointer;
  border: none; background: transparent;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  display: inline-flex; align-items: center; gap: 6px;
  transition: color var(--bn-dur) var(--bn-ease);
  font-family: inherit;
}
.pf-tab:hover { color: var(--bn-ink); }
.pf-tab[aria-selected="true"] {
  color: var(--bn-ink);
  border-bottom-color: var(--bn-accent);
  font-weight: 600;
}
.pf-tab-count {
  font-family: var(--bn-font-mono);
  font-size: 10px;
  background: var(--bn-sunken);
  color: var(--bn-ink-3);
  padding: 1px 6px;
  border-radius: 4px;
}

/* Activity card */
.pf-card {
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-lg);
  padding: var(--bn-s4) var(--bn-s5);
  margin-bottom: var(--bn-s3);
}
.pf-card-head {
  display: flex; align-items: baseline; gap: var(--bn-s2);
  margin-bottom: var(--bn-s2);
  font-size: 12px;
  color: var(--bn-ink-3);
}
.pf-card-kind {
  font-family: var(--bn-font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--bn-accent-100);
  color: var(--bn-accent);
}
.pf-card-kind.reply { background: oklch(95% 0.04 145); color: oklch(48% 0.14 155); }
.pf-card-kind.media { background: oklch(95% 0.04 290); color: oklch(48% 0.18 290); }
.pf-card-kind.event { background: oklch(95% 0.04 60); color: oklch(48% 0.14 60); }
.pf-card-target { color: var(--bn-ink-2); font-weight: 500; }
.pf-card-target a { color: var(--bn-accent); text-decoration: none; }
.pf-card-time {
  margin-left: auto;
  font-family: var(--bn-font-mono);
  font-size: 10px;
  color: var(--bn-ink-4);
}
.pf-card-body {
  font-size: 14px;
  line-height: 1.6;
  color: var(--bn-ink);
}
.pf-card-body .hashtag { color: var(--bn-accent); font-weight: 500; }
.pf-card-body .num-list {
  margin-top: var(--bn-s2);
  padding-left: var(--bn-s4);
  display: flex; flex-direction: column; gap: 2px;
}
.pf-card-image {
  height: 200px;
  margin-top: var(--bn-s3);
  border-radius: var(--bn-r-md);
  background:
    linear-gradient(135deg, color-mix(in oklch, var(--bn-accent) 25%, transparent), color-mix(in oklch, oklch(60% 0.20 290) 25%, transparent)),
    var(--bn-sunken);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--bn-font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: white;
  position: relative;
  overflow: hidden;
}
.pf-card-image::before {
  content:'';
  position:absolute; inset:0;
  background: repeating-linear-gradient(45deg, transparent 0 14px, rgba(255,255,255,0.05) 14px 15px);
}
.pf-card-quoted {
  border-left: 2px solid var(--bn-line);
  padding: var(--bn-s2) var(--bn-s3);
  margin-bottom: var(--bn-s2);
  background: var(--bn-sunken);
  border-radius: 0 var(--bn-r-sm) var(--bn-r-sm) 0;
  font-size: 13px;
  color: var(--bn-ink-3);
}
.pf-card-quoted-author {
  font-weight: 600;
  color: var(--bn-ink-2);
  font-size: 11px;
  margin-bottom: 2px;
}
.pf-card-foot {
  display: flex; gap: var(--bn-s4);
  padding-top: var(--bn-s3);
  border-top: 1px solid var(--bn-line);
  margin-top: var(--bn-s3);
  font-size: 12px;
  color: var(--bn-ink-3);
  align-items: center;
}
.pf-card-foot-item {
  display: inline-flex; align-items: center; gap: 5px;
}
.pf-card-foot-item svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 1.75; fill: none; }
.pf-card-foot-item.hot { color: oklch(58% 0.20 25); }
.pf-card-foot-item.hot svg { fill: currentColor; stroke: none; }
.pf-card-foot-meta {
  margin-left: auto;
  font-family: var(--bn-font-mono);
  font-size: 10px;
  color: var(--bn-ink-4);
}

/* Year heading separator */
.pf-year-sep {
  display: flex; align-items: center; gap: var(--bn-s3);
  padding: var(--bn-s2) 0;
  margin: var(--bn-s4) 0 var(--bn-s2);
}
.pf-year-sep::before, .pf-year-sep::after {
  content: ''; flex: 1; height: 1px; background: var(--bn-line);
}
.pf-year-sep span {
  font-family: var(--bn-font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--bn-ink-4);
}

/* ─── Aside widgets ─── */
.pf-widget {
  background: var(--bn-surface);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-lg);
  padding: var(--bn-s4);
}
.pf-widget-title {
  display: flex; align-items: center; justify-content: space-between;
  font-family: var(--bn-font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--bn-ink-4);
  margin-bottom: var(--bn-s3);
}
.pf-widget-title a {
  color: var(--bn-accent);
  text-decoration: none;
  text-transform: none;
  letter-spacing: 0;
  font-family: var(--bn-font-sans);
  font-size: 11px;
  font-weight: 500;
}

/* Profile completion ring */
.pf-completion {
  display: flex; align-items: center; gap: var(--bn-s3);
  padding-bottom: var(--bn-s3);
}
.pf-completion-ring {
  position: relative;
  width: 56px; height: 56px;
  flex-shrink: 0;
}
.pf-completion-ring svg { width: 56px; height: 56px; transform: rotate(-90deg); }
.pf-completion-ring circle.bg { fill: none; stroke: var(--bn-sunken); stroke-width: 5; }
.pf-completion-ring circle.fg {
  fill: none;
  stroke: var(--bn-accent);
  stroke-width: 5;
  stroke-linecap: round;
}
.pf-completion-pct {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--bn-font-display);
  font-weight: 700;
  font-size: 14px;
  color: var(--bn-ink);
}
.pf-completion-info { flex: 1; }
.pf-completion-info b {
  display: block;
  font-size: 13px;
  color: var(--bn-ink);
  font-weight: 600;
}
.pf-completion-info span {
  font-size: 11px;
  color: var(--bn-ink-3);
  display: block;
  margin-top: 2px;
}
.pf-completion-tasks {
  display: flex; flex-direction: column;
  gap: 6px;
  border-top: 1px solid var(--bn-line);
  padding-top: var(--bn-s3);
}
.pf-completion-task {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px;
  color: var(--bn-ink-2);
}
.pf-completion-task .check {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--bn-accent);
  color: white;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 9px;
  flex-shrink: 0;
}
.pf-completion-task .empty {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 1.5px dashed var(--bn-ink-4);
  flex-shrink: 0;
}
.pf-completion-task.todo { color: var(--bn-ink-3); }
.pf-completion-task.todo a {
  color: var(--bn-accent); text-decoration: none; font-weight: 500;
  margin-left: auto;
}

/* Profile data fields */
.pf-fields {
  display: flex; flex-direction: column;
  gap: var(--bn-s2);
}
.pf-field {
  display: grid; grid-template-columns: 90px 1fr;
  gap: var(--bn-s2);
  font-size: 12px;
  align-items: baseline;
}
.pf-field-key {
  color: var(--bn-ink-4);
  font-family: var(--bn-font-mono);
  font-size: 10px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.pf-field-val {
  color: var(--bn-ink);
  font-weight: 500;
}
.pf-field-val a { color: var(--bn-accent); text-decoration: none; }

/* Skills + tags */
.pf-tags {
  display: flex; flex-wrap: wrap;
  gap: 5px;
}
.pf-tag {
  font-family: var(--bn-font-mono);
  font-size: 11px;
  background: var(--bn-sunken);
  color: var(--bn-ink-2);
  padding: 3px 8px;
  border-radius: 4px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--bn-dur-fast) var(--bn-ease);
}
.pf-tag:hover { background: var(--bn-accent-100); color: var(--bn-accent); }
.pf-tag.endorsed {
  background: var(--bn-accent-100);
  color: var(--bn-accent);
}
.pf-tag-count {
  font-family: var(--bn-font-mono);
  font-size: 9px;
  margin-left: 4px;
  opacity: 0.7;
}

/* Connections */
.pf-conn {
  display: flex; align-items: center;
  gap: var(--bn-s2);
  padding: var(--bn-s2) 0;
  font-size: 12px;
}
.pf-conn + .pf-conn { border-top: 1px solid var(--bn-line); }
.pf-conn-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-family: var(--bn-font-mono);
  font-weight: 600;
  font-size: 10px;
  flex-shrink: 0;
}
.pf-conn-info { flex: 1; min-width: 0; }
.pf-conn-name { font-weight: 500; color: var(--bn-ink); }
.pf-conn-role {
  font-size: 11px;
  color: var(--bn-ink-4);
}
.pf-conn-meta {
  font-family: var(--bn-font-mono);
  font-size: 10px;
  color: var(--bn-ink-4);
}

/* Spaces (member of) */
.pf-space {
  display: flex; align-items: center;
  gap: var(--bn-s2);
  padding: var(--bn-s2) 0;
}
.pf-space + .pf-space { border-top: 1px solid var(--bn-line); }
.pf-space-emblem {
  width: 32px; height: 32px;
  border-radius: var(--bn-r-sm);
  background: linear-gradient(135deg, var(--bn-accent-100), var(--bn-surface));
  border: 1px solid var(--bn-line);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--bn-font-display);
  font-size: 14px;
  font-weight: 700;
  color: var(--bn-accent);
  flex-shrink: 0;
}
.pf-space-info { flex: 1; min-width: 0; }
.pf-space-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--bn-ink);
}
.pf-space-meta {
  font-family: var(--bn-font-mono);
  font-size: 10px;
  color: var(--bn-ink-4);
}
.pf-space-role {
  font-size: 10px;
  font-family: var(--bn-font-mono);
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--bn-sunken);
  color: var(--bn-ink-3);
}
.pf-space-role.admin { background: oklch(95% 0.06 60); color: oklch(50% 0.16 60); }
.pf-space-role.mod   { background: var(--bn-accent-100); color: var(--bn-accent); }
.pf-space-role.paid  { background: color-mix(in oklch, var(--bn-jetonomy, #5b21b6) 15%, transparent); color: var(--bn-jetonomy, #5b21b6); }

/* Now playing / status */
.pf-status {
  background: var(--bn-bg);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-md);
  padding: var(--bn-s3);
  font-size: 12px;
  color: var(--bn-ink-2);
  display: flex; align-items: center; gap: 8px;
  position: relative;
}
.pf-status-emoji { font-size: 18px; }
.pf-status-text { line-height: 1.4; }
.pf-status-time {
  font-family: var(--bn-font-mono);
  font-size: 10px;
  color: var(--bn-ink-4);
  margin-left: auto;
}

/* Activity heatmap */
.pf-heatmap {
  display: grid;
  grid-template-columns: repeat(20, 1fr);
  gap: 3px;
  margin-top: var(--bn-s2);
}
.pf-heatmap-day {
  aspect-ratio: 1;
  border-radius: 2px;
  background: var(--bn-sunken);
}
.pf-heatmap-day.l1 { background: color-mix(in oklch, var(--bn-accent) 18%, var(--bn-sunken)); }
.pf-heatmap-day.l2 { background: color-mix(in oklch, var(--bn-accent) 38%, var(--bn-sunken)); }
.pf-heatmap-day.l3 { background: color-mix(in oklch, var(--bn-accent) 65%, transparent); }
.pf-heatmap-day.l4 { background: var(--bn-accent); }
.pf-heatmap-legend {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: var(--bn-s2);
  font-family: var(--bn-font-mono);
  font-size: 10px;
  color: var(--bn-ink-4);
}
.pf-heatmap-scale {
  display: flex; gap: 2px; align-items: center;
}
.pf-heatmap-scale span {
  width: 10px; height: 10px;
  border-radius: 2px;
}

/* JSON-style identity card */
.pf-jsoncard {
  font-family: var(--bn-font-mono);
  font-size: 11px;
  line-height: 1.6;
  color: var(--bn-ink-2);
  padding: var(--bn-s3);
  background: var(--bn-bg);
  border: 1px solid var(--bn-line);
  border-radius: var(--bn-r-md);
  white-space: pre-wrap;
}

  else if (r > 0.55) level = Math.min(3, Math.floor((r - 0.4) * 7));
  return level ? `<span class="pf-heatmap-day l${level}"></span>` : `<span class="pf-heatmap-day"></span>`;
}).join('');
